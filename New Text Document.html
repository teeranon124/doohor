    `<div class="sy">${paid.map(b=>{const rm=d.rooms.find(r=>r.id===b.room);return`<div class="li"><div class="li-ico" style="background:var(--gl);">${ic('M5 13l4 4L19 7')}</div><div style="flex:1;"><div style="font-weight:600;font-size:14px;">ห้อง ${b.room} — ${b.month} ${b.year}</div><div style="font-size:12px;color:var(--t2);">${rm?rm.tenant:''} &bull; ชำระ ${b.paidDate}</div></div><div style="font-family:'IBM Plex Sans Thai',sans-serif;font-weight:700;color:var(--gn);">฿${b.total.toLocaleString()}</div></div>`;}).join('')}</div>`}`;
  },
  sendLine(bid){const b=dorm().bills.find(x=>x.id===bid);if(b)this.toast(`ส่ง LINE แจ้ง ห้อง ${b.room} เดือน ${b.month}`,'success');},
  approveBill(bid){const b=dorm().bills.find(x=>x.id===bid);if(b){b.status='paid';b.paidDate=thaiDate();save();this.toast(`ยืนยันรับเงินห้อง ${b.room}`,'success');this.renderPage();}},

  // ══════════ CALENDAR ══════════
  pgCal(){
    const d=dorm(),months=last12(),yr=curYear();
    const yi=d.bills.filter(b=>b.status==='paid'&&b.year===yr).reduce((s,b)=>s+b.total,0);
    const occ=d.rooms.filter(r=>r.status==='occupied');
    return`
    <div class="mb5"><div class="pg-title">ปฏิทินรายรับ</div></div>
    <div class="sg mb5">
      <div class="stat g"><div class="stat-l">รายรับปี ${yr}</div><div class="stat-v" style="font-size:16px;">฿${yi.toLocaleString()}</div></div>
      <div class="stat"><div class="stat-l">บิลชำระแล้วปีนี้</div><div class="stat-v">${d.bills.filter(b=>b.status==='paid'&&b.year===yr).length}</div></div>
    </div>
    <div class="cal-grid mb4">${months.map(m=>{
      const mb=d.bills.filter(b=>b.month===m.month&&b.year===m.year);
      const inc=mb.filter(b=>b.status==='paid').reduce((s,b)=>s+b.total,0);
      const unp=mb.filter(b=>b.status==='unpaid'||b.status==='pending_approval').length;
      const isNow=m.month===curMonth()&&m.year===curYear();
      const dots=occ.map(r=>{const rb=mb.find(b=>b.room===r.id);if(!rb)return'<div class="cal-dot cd-n"></div>';if(rb.status==='paid')return'<div class="cal-dot cd-p"></div>';if(rb.status==='pending_approval')return'<div class="cal-dot cd-w"></div>';return'<div class="cal-dot cd-u"></div>';}).join('');
      return`<div class="cal-cell${isNow?' on':''}${unp>0?' alt':''}" onclick="A.showMonthDetail('${m.month}',${m.year})">${unp>0?'<div class="cal-flag"></div>':''}<div class="cal-m">${m.month}</div><div class="cal-y">${m.year}</div><div class="cal-dots">${dots||'<div class="cal-dot cd-n"></div>'}</div>${inc>0?`<div class="cal-inc">฿${inc.toLocaleString()}</div>`:''}</div>`;
    }).join('')}</div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--t2);">
      <span><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--gn);margin-right:4px;"></span>ชำระแล้ว</span>
      <span><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--am);margin-right:4px;"></span>รอยืนยัน</span>
      <span><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--rd);margin-right:4px;"></span>ยังไม่ชำระ</span>
      <span><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--bd2);margin-right:4px;"></span>ไม่มีบิล</span>
    </div>`;
  },
  showMonthDetail(month,year){
    const d=dorm(),mb=d.bills.filter(b=>b.month===month&&b.year===year);
    const inc=mb.filter(b=>b.status==='paid').reduce((s,b)=>s+b.total,0);
    const sm={paid:'<span class="badge b-g">ชำระแล้ว</span>',unpaid:'<span class="badge b-r">รอชำระ</span>',pending_approval:'<span class="badge b-a">รอยืนยัน</span>'};
    document.getElementById('mm-title').textContent=`${month} ${year}`;
    document.getElementById('mm-body').innerHTML=`<div style="font-size:13px;color:var(--t2);margin-bottom:10px;">รายรับที่เก็บได้: <strong style="color:var(--gn);">฿${inc.toLocaleString()}</strong></div>
    ${mb.map(b=>{const rm=d.rooms.find(r=>r.id===b.room);return`<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--bd);"><div><div style="font-weight:600;font-size:14px;">ห้อง ${b.room} ${rm?'— '+rm.tenant:''}</div><div style="font-size:12px;color:var(--t2);">฿${b.total.toLocaleString()} ${b.paidDate?'· ชำระ '+b.paidDate:''}</div></div>${sm[b.status]||''}</div>`;}).join('')}
    ${d.rooms.filter(r=>r.status==='occupied'&&!mb.find(b=>b.room===r.id)).map(r=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--bd);"><div><div style="font-weight:600;font-size:14px;">ห้อง ${r.id} — ${r.tenant}</div><div style="font-size:11px;color:var(--t3);">ยังไม่มีบิล</div></div><span class="badge b-gr">ไม่มีบิล</span></div>`).join('')}`;
    this.openModal('m-month');
  },

  // ══════════ REPAIRS ══════════
  pgRepairs(){
    const d=dorm(),pend=d.repairs.filter(r=>r.status==='pending'),done=d.repairs.filter(r=>r.status==='completed');
    return`<div class="mb5"><div class="pg-title">แจ้งซ่อม</div></div>
    ${pend.length>0?`<div class="sec-lbl">รอดำเนินการ (${pend.length})</div><div class="sy mb5">${pend.map(r=>`<div class="li"><div class="li-ico" style="background:var(--al);">${ic('M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z')}</div><div style="flex:1;"><div style="font-weight:600;font-size:14px;">ห้อง ${r.room}</div><div style="font-size:13px;">${r.issue}</div><div style="font-size:11px;color:var(--t3);margin-top:2px;">${r.date}</div></div><button class="btn bsc bsm" onclick="A.doneRepair('${r.id}')">เสร็จ</button></div>`).join('')}</div>`:
    `<div class="alert al-ok mb5">${ic('M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z')}ไม่มีรายการรอดำเนินการ</div>`}
    ${done.length>0?`<div class="sec-lbl">เสร็จสิ้น</div><div class="sy">${done.map(r=>`<div class="li" style="opacity:.6;"><div class="li-ico" style="background:var(--gl);">${ic('M5 13l4 4L19 7')}</div><div style="flex:1;"><div style="font-weight:600;font-size:14px;">ห้อง ${r.room}</div><div style="font-size:13px;color:var(--t2);">${r.issue}</div><div style="font-size:11px;color:var(--t3);margin-top:2px;">${r.date}</div></div><span class="badge b-g">เสร็จ</span></div>`).join('')}</div>`:``}`;
  },
  doneRepair(id){const r=dorm().repairs.find(x=>x.id===id);if(r){r.status='completed';save();this.toast('บันทึกการซ่อมห้อง '+r.room,'success');this.renderPage();}},

  // ══════════ SETTINGS ══════════
  pgSettings(){
    const d=dorm();
    return`<div class="mb5"><div class="pg-title">ตั้งค่า</div><div class="pg-sub">${d.name}</div></div>
    <div class="s-sec"><div class="s-title">ข้อมูลหอพัก</div>
      <div class="fg"><label class="fl">ชื่อหอพัก</label><input type="text" class="inp" id="s-dn" value="${d.name}"></div>
      <div class="fg"><label class="fl">ที่อยู่/สาขา <span>(ไม่บังคับ)</span></label><input type="text" class="inp" id="s-da" value="${d.addr||''}"></div>
      <div class="fg"><label class="fl">เบอร์พร้อมเพย์</label><input type="text" class="inp" id="s-pp" value="${d.promptpay||''}"></div>
      <div class="fg"><label class="fl">วันครบกำหนดชำระ <span>(วันที่)</span></label><input type="number" class="inp" id="s-due" value="${d.dueDayOfMonth}" min="1" max="28" style="max-width:90px;"></div>
    </div>
    <div class="s-sec"><div class="s-title">อัตราค่าสาธารณูปโภค</div>
      <div class="rate-row"><span class="rate-lbl">ค่าน้ำประปา</span><input type="number" class="rate-inp" id="s-wr" value="${d.waterRate}"><span class="rate-unit">บาท/หน่วย</span></div>
      <div class="rate-row"><span class="rate-lbl">ค่าไฟฟ้า</span><input type="number" class="rate-inp" id="s-er" value="${d.electricRate}"><span class="rate-unit">บาท/หน่วย</span></div>
    </div>
    <div class="s-sec"><div class="s-title">ค่าเช่ารายห้อง</div>
      <div class="sy">${d.rooms.map(r=>`<div style="display:flex;align-items:center;gap:10px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rsm);padding:10px 12px;">
        <div style="flex:1;"><div style="font-weight:600;font-size:13px;">ห้อง ${r.id} <span style="font-weight:400;color:var(--t2);">${r.type}</span></div><div style="font-size:12px;color:var(--t2);">${r.tenant||'ว่าง'}</div></div>
        <input type="number" class="rate-inp" id="rp-${r.id}" value="${r.rentPrice}"><span class="rate-unit">บาท/เดือน</span>
      </div>`).join('')}
    </div>
    <button class="btn bp bblk blg" onclick="A.saveSettings()">${ic('M5 13l4 4L19 7')} บันทึกการตั้งค่า</button>
    <div class="div"></div>
    <div class="s-sec"><div class="s-title" style="color:var(--rd);">โซนอันตราย</div>
      <button class="btn bd_ bsm" onclick="A.resetData()">ล้างข้อมูลทั้งหมด</button>
      <div class="hint mt3">ไม่สามารถย้อนกลับได้</div>
    </div>`;
  },
  saveSettings(){
    const d=dorm();
    d.name=document.getElementById('s-dn').value.trim()||d.name;
    d.addr=document.getElementById('s-da').value.trim();
    d.promptpay=document.getElementById('s-pp').value.trim();
    d.dueDayOfMonth=parseInt(document.getElementById('s-due').value)||5;
    d.waterRate=parseFloat(document.getElementById('s-wr').value)||d.waterRate;
    d.electricRate=parseFloat(document.getElementById('s-er').value)||d.electricRate;
    d.rooms.forEach(r=>{const el=document.getElementById('rp-'+r.id);if(el){const v=parseInt(el.value);if(v>0)r.rentPrice=v;}});
    save();this.renderDormSwitcher();this.toast('บันทึกการตั้งค่าเรียบร้อย','success');
  },
  resetData(){if(!confirm('ล้างข้อมูลทั้งหมด?'))return;localStorage.removeItem(STORE);S=DEF();save();this.toast('ล้างข้อมูลเรียบร้อย','success');this.renderPage();},

  // ══════════ TENANT PAGES ══════════
  pgTHome(){
    const d=dorm(),r=d.rooms.find(x=>x.id===Se.tenantRoom);
    const active=d.bills.find(b=>b.room===Se.tenantRoom&&(b.status==='unpaid'||b.status==='pending_approval'));
    if(!active)return`<div style="text-align:center;padding:52px 20px;"><div style="width:56px;height:56px;background:var(--gl);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">${ic('M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z').replace('width:14px;height:14px','width:28px;height:28px')}</div><div style="font-family:'IBM Plex Sans Thai',sans-serif;font-size:18px;font-weight:700;">ไม่มีบิลค้างชำระ</div><div style="font-size:13px;color:var(--t2);margin-top:4px;">ชำระค่าเช่าเดือนนี้เรียบร้อยแล้ว</div></div>`;
    const wD=active.we-active.ws,eD=active.ee-active.es;
    return`<div class="mb5"><div class="pg-title">บิลเดือน ${active.month} ${active.year}</div><div style="font-size:13px;color:var(--rd);font-weight:500;margin-top:2px;">ครบกำหนด: ${active.dueDate}</div></div>
    <div class="card"><div class="cp">
      <div style="font-size:12px;color:var(--t2);margin-bottom:9px;">ห้อง ${active.room}</div>
      <div class="bill-blk"><div class="bill-blk-l">ค่าเช่าห้อง</div><div style="font-size:15px;font-weight:600;">฿${active.rent.toLocaleString()}</div></div>
      <div class="bill-blk" style="border:1px solid #b8d0f0;"><div class="bill-blk-l" style="color:var(--bl);">ค่าน้ำประปา</div><div style="display:flex;justify-content:space-between;align-items:center;"><div style="font-size:12px;color:var(--t2);">${active.ws} → ${active.we} = ${wD} หน่วย x ${d.waterRate} บาท</div><div style="font-weight:600;">฿${(wD*d.waterRate).toLocaleString()}</div></div></div>
      <div class="bill-blk" style="border:1px solid #f0d090;"><div class="bill-blk-l" style="color:var(--am);">ค่าไฟฟ้า</div><div style="display:flex;justify-content:space-between;align-items:center;"><div style="font-size:12px;color:var(--t2);">${active.es} → ${active.ee} = ${eD} หน่วย x ${d.electricRate} บาท</div><div style="font-weight:600;">฿${(eD*d.electricRate).toLocaleString()}</div></div></div>
      ${active.otherFees>0?`<div class="bill-blk"><div class="bill-blk-l">${active.otherDesc||'ค่าอื่นๆ'}</div><div style="font-weight:600;">฿${active.otherFees.toLocaleString()}</div></div>`:''}
      <div class="bill-tot"><div class="bill-tot-l">ยอดชำระสุทธิ</div><div class="bill-tot-v">฿${active.total.toLocaleString()}</div></div>
      <div style="margin-top:14px;">
        ${active.status==='unpaid'?`<div style="font-size:12px;color:var(--t2);margin-bottom:9px;text-align:center;">โอนพร้อมเพย์ <strong>${d.promptpay}</strong></div><button class="btn bp bblk blg" onclick="A.openPayModal('${active.id}')">แจ้งชำระเงิน</button>`:
        `<div class="alert al-w">${ic('M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z')}<span>แจ้งชำระแล้ว รอผู้ดูแลตรวจสอบ</span></div>`}
      </div>
    </div></div>`;
  },
  openPayModal(bid){
    Se._payBill=bid;const now=new Date();
    document.getElementById('pay-date').value=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    document.getElementById('pay-note').value='';
    document.getElementById('pay-pp').textContent=dorm().promptpay;
    this.openModal('m-pay');
  },
  confirmPay(){const b=dorm().bills.find(x=>x.id===Se._payBill);if(b){b.status='pending_approval';b.payNote=document.getElementById('pay-note').value;save();}this.closeModal('m-pay');this.toast('แจ้งชำระเงินเรียบร้อย รอผู้ดูแลตรวจสอบ','success');this.renderPage();},

  pgTHistory(){
    const d=dorm(),paid=d.bills.filter(b=>b.room===Se.tenantRoom&&b.status==='paid').sort((a,b)=>b.year-a.year||TH_M.indexOf(b.month)-TH_M.indexOf(a.month));
    return`<div class="mb5"><div class="pg-title">ประวัติการชำระ</div></div>${paid.length===0?`<div class="empty"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg><div class="empty-t">ยังไม่มีประวัติ</div></div>`:
    `<div class="sy">${paid.map(b=>`<div class="li"><div class="li-ico" style="background:var(--gl);">${ic('M5 13l4 4L19 7')}</div><div style="flex:1;"><div style="font-weight:600;font-size:14px;">เดือน ${b.month} ${b.year}</div><div style="font-size:12px;color:var(--t2);">ชำระ ${b.paidDate}</div></div><div style="font-family:'IBM Plex Sans Thai',sans-serif;font-weight:700;color:var(--gn);">฿${b.total.toLocaleString()}</div></div>`).join('')}</div>`}`;
  },

  pgTContract(){
    const d=dorm(),r=d.rooms.find(x=>x.id===Se.tenantRoom);
    if(!r)return'';
    const v=daysLeft(r.contractEnd);
    const cb=v===null?null:v<0?'expired':v<=7?'danger':v<=30?'warn':'ok';
    return`<div class="mb5"><div class="pg-title">สัญญาเช่า</div></div>
    <div class="tc mb5"><div class="tc-head"><div><div class="tc-room">ห้อง ${r.id}</div><div class="tc-name">${r.tenant}</div></div><span class="badge" style="background:rgba(255,255,255,.2);color:#fff;">${r.type}</span></div>
    <div class="tc-body">
      <div class="tc-row"><span class="tc-lbl">วันเข้าอยู่</span><span class="tc-val">${r.moveInDate||'-'}</span></div>
      <div class="tc-row"><span class="tc-lbl">เริ่มสัญญา</span><span class="tc-val">${r.contractStart||'-'}</span></div>
      <div class="tc-row"><span class="tc-lbl">สิ้นสุดสัญญา</span><span class="tc-val">${r.contractEnd||'-'}</span></div>
      <div class="tc-row"><span class="tc-lbl">ค่าเช่า</span><span class="tc-val">฿${r.rentPrice.toLocaleString()}/เดือน</span></div>
      <div class="tc-row"><span class="tc-lbl">ค่ามัดจำ</span><span class="tc-val">฿${r.depositAmount.toLocaleString()}</span></div>
      ${cb?`<div class="cbar ${cb==='ok'?'ok':cb==='expired'?'danger':cb}">${cb==='expired'?'สัญญาหมดอายุแล้ว — กรุณาติดต่อผู้ดูแล':cb==='ok'?`สัญญาหมด ${r.contractEnd} (อีก ${v} วัน)`:`สัญญาจะหมด ${r.contractEnd} อีก <strong>${v} วัน</strong>`}</div>`:''}
    </div></div>`;
  },

  pgTRepairs(){
    const d=dorm(),my=d.repairs.filter(r=>r.room===Se.tenantRoom).sort((a,b)=>b.id.localeCompare(a.id));
    return`<div class="mb5"><div class="pg-title">แจ้งซ่อม</div></div>
    <div class="card mb5"><div class="cp">
      <div class="fg"><label class="fl">รายละเอียดปัญหา</label><textarea class="ta" id="ri" placeholder="อธิบายให้ชัดเจน เช่น แอร์ไม่เย็น หลอดไฟขาด"></textarea></div>
      <button class="btn bp bblk" onclick="A.subRepair()">ส่งเรื่องแจ้งซ่อม</button>
    </div></div>
    <div class="sec-lbl">รายการของฉัน</div>
    ${my.length===0?`<div class="empty"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg><div class="empty-t">ยังไม่มีรายการ</div></div>`:
    `<div class="sy">${my.map(r=>`<div class="li"><div style="flex:1;"><div style="font-weight:600;font-size:14px;">${r.issue}</div><div style="font-size:12px;color:var(--t3);margin-top:2px;">${r.date}</div></div><span class="badge ${r.status==='pending'?'b-a':'b-g'}">${r.status==='pending'?'รอดำเนินการ':'เสร็จสิ้น'}</span></div>`).join('')}</div>`}`;
  },
  subRepair(){const v=document.getElementById('ri').value.trim();if(!v){this.toast('กรุณาระบุรายละเอียด','error');return;}dorm().repairs.unshift({id:'R'+uid(),room:Se.tenantRoom,issue:v,date:thaiDate(),status:'pending'});save();this.toast('ส่งเรื่องแจ้งซ่อมเรียบร้อย','success');this.renderPage();},

  // ─── MODALS / TOAST ───
  openModal(id){document.getElementById(id).classList.add('open');},
  closeModal(id){document.getElementById(id).classList.remove('open');},
  toast(msg,type='info'){
    const w=document.getElementById('toast-wrap');const el=document.createElement('div');el.className='toast '+type;
    const ic2={success:'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z',error:'M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z',info:'M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z'};
    el.innerHTML=`<svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${ic2[type]||ic2.info}"/></svg><span>${msg}</span>`;
    w.appendChild(el);setTimeout(()=>el.classList.add('show'),10);setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),200);},3000);
  },
};

// init
document.querySelectorAll('.ovl').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
document.getElementById('pin-inp').addEventListener('keydown',e=>{if(e.key==='Enter')A.confirmPin();});
window.addEventListener('DOMContentLoaded',()=>A.show('scr-landing'));
</script>
</body>
</html>
