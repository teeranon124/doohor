<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dormy</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f3ef;--sf:#fff;--s2:#f0efe9;--bd:#e4e2d8;--bd2:#d0cec4;
  --tx:#1a1917;--t2:#6b6960;--t3:#a8a69e;
  --gn:#2c6e49;--gl:#e8f2ec;--gm:#b8d9c4;
  --am:#b07d1a;--al:#fdf3dc;
  --rd:#b83232;--rl:#fdecea;
  --bl:#1e5fa0;--bll:#e8f0fb;
  --r:10px;--rsm:7px;--rlg:16px;
  --sh:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);
  --shmd:0 4px 20px rgba(0,0,0,.1);
}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:99px}

/* ─── SCREENS ─── */
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}

/* ─── LANDING ─── */
#scr-landing{align-items:center;justify-content:center;padding:24px;gap:0}
.land-logo{font-family:'IBM Plex Sans Thai',sans-serif;font-size:36px;font-weight:700;color:var(--gn);letter-spacing:-.5px}
.land-sub{font-size:14px;color:var(--t2);margin-bottom:40px;margin-top:4px}
.land-cards{display:flex;flex-direction:column;gap:10px;width:100%;max-width:360px}
.land-card{background:var(--sf);border:1.5px solid var(--bd);border-radius:var(--rlg);padding:18px 20px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:border-color .15s,box-shadow .15s}
.land-card:hover,.land-card:active{border-color:var(--gn);box-shadow:var(--sh)}
.lc-ico{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lc-ico svg{width:21px;height:21px}
.lc-t{font-weight:700;font-size:15px}
.lc-d{font-size:12px;color:var(--t2);margin-top:2px}

/* ─── PIN ─── */
#scr-pin{align-items:center;justify-content:center;padding:24px}
.pin-box{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rlg);padding:28px 24px;width:100%;max-width:360px;box-shadow:var(--sh)}
.pin-title{font-family:'IBM Plex Sans Thai',sans-serif;font-size:18px;font-weight:700;margin-bottom:3px}
.pin-sub{font-size:13px;color:var(--t2);margin-bottom:18px}
.pin-inp{width:100%;font-family:'IBM Plex Sans Thai',sans-serif;font-size:26px;font-weight:700;text-align:center;letter-spacing:6px;background:var(--s2);border:1.5px solid var(--bd);border-radius:var(--rsm);padding:13px;color:var(--tx);outline:none;-webkit-appearance:none;transition:border-color .15s}
.pin-inp:focus{border-color:var(--gn);background:var(--sf)}
.pin-err{font-size:12px;color:var(--rd);margin-top:5px;text-align:center;min-height:16px}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.chip{background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;color:var(--t2);transition:all .12s}
.chip:hover{background:var(--gl);color:var(--gn);border-color:var(--gm)}

/* ─── MAIN APP ─── */
#scr-app{flex-direction:column}
.navbar{background:var(--sf);border-bottom:1px solid var(--bd);padding:0 14px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;gap:8px}
.nav-brand{font-family:'IBM Plex Sans Thai',sans-serif;font-weight:700;font-size:17px;color:var(--gn);display:flex;align-items:center;gap:7px;flex-shrink:0}
.nav-brand svg{width:17px;height:17px}
.nav-center{flex:1;display:flex;justify-content:center;min-width:0}
/* dorm switcher */
.dorm-switcher{display:flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:5px 10px;cursor:pointer;max-width:200px;min-width:0;font-size:13px;font-weight:600;color:var(--tx);transition:border-color .12s}
.dorm-switcher:hover{border-color:var(--gn)}
.dorm-switcher svg{width:14px;height:14px;flex-shrink:0;color:var(--t2)}
.dorm-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-r{display:flex;align-items:center;gap:6px;flex-shrink:0}
.btn-so{font-size:12px;color:var(--t2);background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:5px 9px;cursor:pointer;font-family:'Sarabun',sans-serif;white-space:nowrap}
.btn-so:hover{background:var(--bd)}

/* ─── DORM SELECTOR OVERLAY ─── */
.dorm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;align-items:flex-start;justify-content:center;padding-top:60px}
.dorm-overlay.open{display:flex}
.dorm-drop{background:var(--sf);border-radius:var(--rlg);padding:16px;width:calc(100% - 32px);max-width:360px;box-shadow:var(--shmd)}
.dorm-drop-title{font-size:12px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.dorm-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--rsm);cursor:pointer;transition:background .1s}
.dorm-item:hover,.dorm-item.active{background:var(--gl)}
.dorm-item.active .dorm-item-name{color:var(--gn);font-weight:700}
.dorm-item-ico{width:32px;height:32px;border-radius:8px;background:var(--gl);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'IBM Plex Sans Thai',sans-serif;font-size:13px;font-weight:700;color:var(--gn)}
.dorm-item-name{font-weight:600;font-size:14px}
.dorm-item-sub{font-size:12px;color:var(--t2)}
.dorm-add-btn{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:var(--rsm);cursor:pointer;border:1.5px dashed var(--bd);margin-top:8px;color:var(--t2);font-size:13px;font-weight:600;transition:all .12s}
.dorm-add-btn:hover{border-color:var(--gn);color:var(--gn);background:var(--gl)}
.dorm-add-btn svg{width:16px;height:16px}

/* ─── TABS ─── */
.tab-bar{background:var(--sf);border-bottom:1px solid var(--bd);display:flex;overflow-x:auto;scrollbar-width:none;padding:0 10px;position:sticky;top:52px;z-index:190}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{display:flex;align-items:center;gap:5px;padding:12px 13px;font-size:13px;font-weight:500;color:var(--t2);border:none;background:none;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:color .12s,border-color .12s;flex-shrink:0;font-family:'Sarabun',sans-serif}
.tab-btn.on{color:var(--gn);border-bottom-color:var(--gn);font-weight:700}
.tab-btn svg{width:14px;height:14px}
.tbn{background:var(--rd);color:#fff;border-radius:999px;font-size:10px;font-weight:700;padding:1px 5px;min-width:16px;text-align:center;line-height:1.4}

/* ─── BOTTOM NAV ─── */
.btm-nav{position:fixed;bottom:0;left:0;right:0;background:var(--sf);border-top:1px solid var(--bd);display:none;z-index:190;padding-bottom:env(safe-area-inset-bottom)}
@media(max-width:600px){.btm-nav{display:flex}.tab-bar{display:none}body{padding-bottom:56px}}
.bnb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 2px;font-size:9.5px;font-weight:500;color:var(--t2);background:none;border:none;cursor:pointer;position:relative;font-family:'Sarabun',sans-serif;min-width:0}
.bnb.on{color:var(--gn)}
.bnb svg{width:19px;height:19px}
.bnb span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:56px}
.bnb-dot{position:absolute;top:5px;right:calc(50% - 16px);width:7px;height:7px;background:var(--rd);border-radius:50%;border:1.5px solid var(--sf)}
main{flex:1;padding:16px;max-width:720px;width:100%;margin:0 auto}
@media(min-width:640px){main{padding:22px 24px}}

/* ─── TYPE ─── */
.pg-title{font-family:'IBM Plex Sans Thai',sans-serif;font-size:20px;font-weight:700;letter-spacing:-.2px}
.pg-sub{font-size:13px;color:var(--t2);margin-top:2px}
.sec-lbl{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px}

/* ─── CARD ─── */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh)}
.cp{padding:16px}.cpsm{padding:12px}

/* ─── STATS ─── */
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:480px){.sg{grid-template-columns:repeat(3,1fr)}}
.stat{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:13px}
.stat.g{background:var(--gl);border-color:var(--gm)}.stat.a{background:var(--al);border-color:#f0d090}.stat.r{background:var(--rl);border-color:#f0b8b8}
.stat-l{font-size:12px;color:var(--t2);margin-bottom:3px}
.stat-v{font-family:'IBM Plex Sans Thai',sans-serif;font-size:22px;font-weight:700}
.stat.g .stat-v{color:var(--gn)}.stat.a .stat-v{color:var(--am)}.stat.r .stat-v{color:var(--rd)}

/* ─── FORM ─── */
.fg{margin-bottom:13px}
.fl{display:block;font-size:13px;font-weight:600;color:var(--tx);margin-bottom:4px}
.fl span{font-weight:400;color:var(--t2)}
.inp,.sel,.ta{width:100%;font-family:'Sarabun',sans-serif;font-size:14px;background:var(--s2);border:1.5px solid var(--bd);border-radius:var(--rsm);padding:9px 11px;color:var(--tx);outline:none;transition:border-color .12s;-webkit-appearance:none}
.inp:focus,.sel:focus,.ta:focus{border-color:var(--gn);background:var(--sf)}
.inp:disabled,.sel:disabled{opacity:.5;cursor:not-allowed}
.ta{resize:vertical;min-height:78px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
@media(max-width:460px){.r2{grid-template-columns:1fr}}
.hint{font-size:12px;color:var(--t3);margin-top:3px}
.hint.ok{color:var(--gn);font-weight:500}.hint.err{color:var(--rd)}

/* ─── BUTTONS ─── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:600;padding:9px 16px;border-radius:var(--rsm);border:none;cursor:pointer;transition:opacity .12s,transform .1s;white-space:nowrap;line-height:1.2}
.btn:active{transform:scale(.97)}.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn svg{width:14px;height:14px;flex-shrink:0}
.bp{background:var(--gn);color:#fff}.bp:hover:not(:disabled){opacity:.86}
.bg_{background:var(--s2);color:var(--tx);border:1px solid var(--bd)}.bg_:hover:not(:disabled){background:var(--bd)}
.bd_{background:var(--rd);color:#fff}.bd_:hover:not(:disabled){opacity:.86}
.bsc{background:#1a7a40;color:#fff}.bsc:hover:not(:disabled){opacity:.86}
.bln{background:#06C755;color:#fff}.bln:hover:not(:disabled){opacity:.86}
.bam{background:var(--am);color:#fff}.bam:hover:not(:disabled){opacity:.86}
.bsm{font-size:13px;padding:6px 11px}.bblk{width:100%}.blg{font-size:15px;padding:11px 20px}

/* ─── BADGE ─── */
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px}
.b-g{background:var(--gl);color:var(--gn)}.b-r{background:var(--rl);color:var(--rd)}.b-a{background:var(--al);color:var(--am)}.b-gr{background:var(--s2);color:var(--t2);border:1px solid var(--bd)}.b-b{background:var(--bll);color:var(--bl)}

/* ─── LIST ─── */
.li{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:13px;display:flex;align-items:flex-start;justify-content:space-between;gap:11px}
.li+.li{margin-top:8px}
.li-ico{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.li-ico svg{width:16px;height:16px}

/* ─── ALERT ─── */
.alert{border-radius:var(--rsm);padding:10px 13px;font-size:13px;display:flex;align-items:flex-start;gap:8px}
.alert svg{width:15px;height:15px;flex-shrink:0;margin-top:1px}
.al-w{background:var(--al);color:#7a5200;border:1px solid #f0d090}
.al-i{background:var(--bll);color:#1a4980;border:1px solid #b8d0f0}
.al-ok{background:var(--gl);color:var(--gn);border:1px solid var(--gm)}
.al-r{background:var(--rl);color:var(--rd);border:1px solid #f0b8b8}

/* ─── PREVIEW BOX ─── */
.prev{background:var(--s2);border:1px solid var(--bd);border-radius:var(--rsm);padding:12px 14px}
.prow{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:4px 0}
.prow+.prow{border-top:1px solid var(--bd)}
.prow.tot{font-weight:700;font-size:14px;color:var(--gn);padding-top:9px;margin-top:4px;border-top:1.5px solid var(--bd2)}

/* ─── METER TABLE (responsive) ─── */
/* Desktop: full table */
.meter-wrap{border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.meter-table{width:100%;border-collapse:collapse;font-size:13.5px}
.meter-table th{background:var(--s2);padding:9px 10px;font-weight:700;text-align:left;color:var(--t2);font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bd);white-space:nowrap}
.meter-table th:not(:first-child){border-left:1px solid var(--bd)}
.meter-table td{padding:10px 10px;background:var(--sf);vertical-align:middle;border-bottom:1px solid var(--bd)}
.meter-table td:not(:first-child){border-left:1px solid var(--bd)}
.meter-table tr:last-child td{border-bottom:none}
/* number input inside table */
.m-inp{font-family:'IBM Plex Sans Thai',sans-serif;font-size:14px;font-weight:600;text-align:right;background:var(--s2);border:1.5px solid var(--bd);border-radius:6px;padding:7px 9px;color:var(--tx);outline:none;-webkit-appearance:none;width:100%;min-width:80px;transition:border-color .12s}
.m-inp:focus{border-color:var(--gn);background:var(--sf)}
.m-inp.err{border-color:var(--rd);background:var(--rl)}
.diff-ok{color:var(--gn);font-weight:700;font-family:'IBM Plex Sans Thai',sans-serif;font-size:12px;text-align:right;white-space:nowrap}
.diff-bad{color:var(--rd);font-weight:700;font-family:'IBM Plex Sans Thai',sans-serif;font-size:12px;text-align:right;white-space:nowrap}
.diff-na{color:var(--t3);font-size:12px;text-align:right}
.cost-cell{font-family:'IBM Plex Sans Thai',sans-serif;font-size:13px;font-weight:700;color:var(--gn);text-align:right;white-space:nowrap}

/* Mobile meter: card stack — hidden on desktop */
.meter-cards{display:none}
@media(max-width:640px){
  .meter-table-wrap{display:none}
  .meter-cards{display:flex;flex-direction:column;gap:10px}
}

.meter-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.meter-card-head{background:var(--s2);padding:10px 13px;display:flex;justify-content:space-between;align-items:center}
.meter-card-room{font-family:'IBM Plex Sans Thai',sans-serif;font-size:16px;font-weight:700}
.meter-card-tenant{font-size:12px;color:var(--t2)}
.meter-card-body{padding:12px 13px;display:flex;flex-direction:column;gap:10px}
.meter-field{display:flex;flex-direction:column;gap:4px}
.meter-field-label{font-size:12px;font-weight:600;color:var(--t2)}
.meter-field-row{display:flex;align-items:center;gap:8px}
.meter-field-prev{font-family:'IBM Plex Sans Thai',sans-serif;font-size:13px;font-weight:600;color:var(--t3);white-space:nowrap;min-width:36px}
.meter-field-arrow{color:var(--t3);font-size:14px;flex-shrink:0}
.meter-field .m-inp{flex:1}
.meter-field-diff{font-size:12px;font-weight:600;min-height:16px}
.meter-card-other{display:flex;flex-direction:column;gap:4px}
.meter-card-other label{font-size:12px;font-weight:600;color:var(--t2)}
.meter-card-total{background:var(--gl);padding:10px 13px;display:flex;justify-content:space-between;align-items:center}
.meter-card-total-lbl{font-size:13px;color:var(--gn)}
.meter-card-total-val{font-family:'IBM Plex Sans Thai',sans-serif;font-size:16px;font-weight:700;color:var(--gn)}

/* ─── SUMMARY TABLE ─── */
.sum-table{width:100%;border-collapse:collapse;font-size:13px}
.sum-table th{background:var(--s2);border:1px solid var(--bd);padding:8px 11px;font-weight:700;color:var(--t2);font-size:11px;text-transform:uppercase;letter-spacing:.5px;text-align:left}
.sum-table td{border:1px solid var(--bd);padding:9px 11px;background:var(--sf);vertical-align:middle}
.sum-table .tr-tot td{background:var(--gl);font-weight:700;color:var(--gn)}
.sum-table .grand-tot{background:var(--gn)!important;color:#fff!important;font-size:14px;font-weight:700}

/* ─── ROOMS ─── */
.room-list{display:flex;flex-direction:column;gap:10px}
.room-card{background:var(--sf);border:1.5px solid var(--bd);border-radius:var(--r);padding:14px;border-left-width:4px}
.room-card.occ{border-left-color:var(--gn)}.room-card.vac{border-left-color:var(--bd)}
.room-num{font-family:'IBM Plex Sans Thai',sans-serif;font-size:18px;font-weight:700}
.room-meta{font-size:12px;color:var(--t2);margin-top:6px;padding-top:8px;border-top:1px solid var(--bd);line-height:1.8}
.room-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}

/* ─── CALENDAR ─── */
.cal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(min-width:480px){.cal-grid{grid-template-columns:repeat(4,1fr)}}
.cal-cell{background:var(--sf);border:1.5px solid var(--bd);border-radius:var(--rsm);padding:9px 7px;text-align:center;cursor:pointer;position:relative;transition:border-color .12s}
.cal-cell:hover{border-color:var(--gn)}.cal-cell.on{border-color:var(--gn);background:var(--gl)}.cal-cell.alt{border-color:var(--am)}
.cal-m{font-size:11px;color:var(--t2)}.cal-y{font-size:10px;color:var(--t3)}
.cal-dots{display:flex;justify-content:center;gap:3px;margin-top:5px}
.cal-dot{width:6px;height:6px;border-radius:50%}
.cd-p{background:var(--gn)}.cd-u{background:var(--rd)}.cd-w{background:var(--am)}.cd-n{background:var(--bd2)}
.cal-inc{font-size:10px;color:var(--t2);margin-top:3px}
.cal-flag{position:absolute;top:4px;right:4px;width:6px;height:6px;border-radius:50%;background:var(--am)}

/* ─── TENANT CARD ─── */
.tc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.tc-head{background:var(--gn);padding:14px;color:#fff;display:flex;justify-content:space-between;align-items:flex-start}
.tc-room{font-family:'IBM Plex Sans Thai',sans-serif;font-size:26px;font-weight:700}
.tc-name{font-size:13px;opacity:.9;margin-top:2px}
.tc-body{padding:13px}
.tc-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0}
.tc-row+.tc-row{border-top:1px solid var(--bd)}
.tc-lbl{color:var(--t2)}.tc-val{font-weight:600}
.cbar{border-radius:var(--rsm);padding:9px 13px;margin-top:9px;font-size:12px}
.cbar.ok{background:var(--gl);color:var(--gn)}.cbar.warn{background:var(--al);color:#7a5200}.cbar.danger{background:var(--rl);color:var(--rd)}

/* ─── BILL CARD (tenant) ─── */
.bill-blk{background:var(--s2);border-radius:var(--rsm);padding:10px 12px;margin-bottom:7px}
.bill-blk-l{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.bill-tot{background:var(--gl);border:1px solid var(--gm);border-radius:var(--rsm);padding:12px 14px;display:flex;justify-content:space-between;align-items:center;margin-top:11px}
.bill-tot-l{font-size:13px;font-weight:600;color:var(--gn)}
.bill-tot-v{font-family:'IBM Plex Sans Thai',sans-serif;font-size:21px;font-weight:700;color:var(--gn)}

/* ─── SETTINGS ─── */
.s-sec{margin-bottom:22px}
.s-title{font-size:13px;font-weight:700;color:var(--t2);margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--bd)}
.rate-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.rate-lbl{font-size:13px;font-weight:600;flex:1}
.rate-inp{width:86px;font-family:'IBM Plex Sans Thai',sans-serif;font-size:14px;font-weight:600;text-align:right;background:var(--s2);border:1.5px solid var(--bd);border-radius:var(--rsm);padding:7px 9px;color:var(--tx);outline:none}
.rate-inp:focus{border-color:var(--gn);background:var(--sf)}
.rate-unit{font-size:12px;color:var(--t2);white-space:nowrap}

/* ─── MODAL ─── */
.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:400;align-items:flex-end;justify-content:center}
@media(min-width:600px){.ovl{align-items:center}}
.ovl.open{display:flex}
.modal{background:var(--sf);border-radius:14px 14px 0 0;padding:20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
@media(min-width:600px){.modal{border-radius:14px}}
.m-handle{width:32px;height:3px;background:var(--bd2);border-radius:999px;margin:0 auto 16px}
@media(min-width:600px){.m-handle{display:none}}
.m-title{font-family:'IBM Plex Sans Thai',sans-serif;font-size:16px;font-weight:700;margin-bottom:13px}

/* ─── UTILS ─── */
.div{height:1px;background:var(--bd);margin:14px 0}
.mt3{margin-top:10px}.mt4{margin-top:14px}.mt5{margin-top:20px}.mt6{margin-top:24px}
.mb3{margin-bottom:10px}.mb4{margin-bottom:14px}.mb5{margin-bottom:20px}
.fx{display:flex}.aic{align-items:center}.jcsb{justify-content:space-between}.g2{gap:8px}.g3{gap:12px}.f1{flex:1}
.sy>*+*{margin-top:8px}
.ow{overflow-x:auto;-webkit-overflow-scrolling:touch}
.empty{text-align:center;padding:40px 20px;color:var(--t2)}
.empty svg{width:40px;height:40px;opacity:.2;margin:0 auto 9px;display:block}
.empty-t{font-weight:600;font-size:14px;color:var(--tx);margin-bottom:2px}.empty-d{font-size:12px}
#toast-wrap{position:fixed;top:62px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:6px;pointer-events:none;width:min(350px,calc(100vw - 24px))}
.toast{background:var(--tx);color:#fff;padding:10px 14px;border-radius:var(--rsm);font-size:13px;font-weight:500;box-shadow:var(--shmd);display:flex;align-items:center;gap:8px;opacity:0;transform:translateY(-8px);transition:opacity .16s,transform .16s}
.toast.show{opacity:1;transform:none}.toast.success{background:var(--gn)}.toast.error{background:var(--rd)}
.toast svg{width:14px;height:14px;flex-shrink:0}
</style>
</head>
<body>

<!-- ── LANDING ── -->
<div id="scr-landing" class="screen">
  <div class="land-logo">Dormy</div>
  <div class="land-sub">ระบบจัดการหอพัก</div>
  <div class="land-cards">
    <div class="land-card" onclick="A.goAdmin()">
      <div class="lc-ico" style="background:var(--gl);">
        <svg fill="none" viewBox="0 0 24 24" stroke="var(--gn)" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      </div>
      <div><div class="lc-t">ผู้ดูแลหอพัก</div><div class="lc-d">จัดการหอ ห้อง มิเตอร์ บิล</div></div>
    </div>
    <div class="land-card" onclick="A.goTenant()">
      <div class="lc-ico" style="background:var(--bll);">
        <svg fill="none" viewBox="0 0 24 24" stroke="var(--bl)" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      </div>
      <div><div class="lc-t">ผู้เช่า</div><div class="lc-d">ดูบิล สัญญา และแจ้งซ่อม</div></div>
    </div>
  </div>
</div>

<!-- ── PIN ── -->
<div id="scr-pin" class="screen">
  <div class="pin-box">
    <div class="pin-title">เข้าสู่ระบบผู้เช่า</div>
    <div class="pin-sub">พิมพ์หมายเลขห้องของคุณ</div>
    <input class="pin-inp" id="pin-inp" type="text" maxlength="5" placeholder="101" autocomplete="off" oninput="A.onPinInput(this)">
    <div class="pin-err" id="pin-err"></div>
    <div class="hint" style="text-align:center;margin-top:5px;">กดห้องด้านล่าง หรือพิมพ์แล้วกด Enter</div>
    <div class="chips mt3" id="pin-chips"></div>
    <div style="display:flex;gap:8px;margin-top:16px;">
      <button class="btn bg_ f1" onclick="A.goLanding()">ย้อนกลับ</button>
      <button class="btn bp f1" id="pin-ok" onclick="A.confirmPin()" disabled>เข้าใช้งาน</button>
    </div>
  </div>
</div>

<!-- ── APP ── -->
<div id="scr-app" class="screen">
  <nav class="navbar">
    <div class="nav-brand">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
      Dormy
    </div>
    <div class="nav-center" id="nav-dorm-wrap"></div>
    <div class="nav-r">
      <button class="btn-so" onclick="A.signOut()">ออก</button>
    </div>
  </nav>
  <div class="tab-bar" id="tab-bar"></div>
  <main id="pg"></main>
  <div class="btm-nav" id="btm-nav"></div>
</div>

<!-- ── DORM SWITCHER DROPDOWN ── -->
<div class="dorm-overlay" id="dorm-overlay" onclick="A.closeDormDrop(event)">
  <div class="dorm-drop" id="dorm-drop"></div>
</div>

<!-- MODALS -->
<div class="ovl" id="m-pay">
  <div class="modal">
    <div class="m-handle"></div>
    <div class="m-title">แจ้งการชำระเงิน</div>
    <div class="alert al-i mb4">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      โอนเงินเข้าพร้อมเพย์ <strong id="pay-pp"></strong>
    </div>
    <div class="fg"><label class="fl">วันที่โอน</label><input type="date" class="inp" id="pay-date"></div>
    <div class="fg"><label class="fl">หมายเหตุ <span>(ไม่บังคับ)</span></label><input type="text" class="inp" id="pay-note" placeholder="เช่น โอน KBank"></div>
    <div style="display:flex;gap:8px;margin-top:6px;">
      <button class="btn bg_ f1" onclick="A.closeModal('m-pay')">ยกเลิก</button>
      <button class="btn bp f1" onclick="A.confirmPay()">ยืนยันแจ้งชำระ</button>
    </div>
  </div>
</div>

<div class="ovl" id="m-add-dorm">
  <div class="modal">
    <div class="m-handle"></div>
    <div class="m-title">เพิ่มหอพักใหม่</div>
    <div class="fg"><label class="fl">ชื่อหอพัก</label><input type="text" class="inp" id="nd-name" placeholder="เช่น Dormy สาขา 2"></div>
    <div class="fg"><label class="fl">ที่อยู่ / สาขา <span>(ไม่บังคับ)</span></label><input type="text" class="inp" id="nd-addr" placeholder="เช่น ซอยรามคำแหง 24"></div>
    <div class="fg"><label class="fl">เบอร์พร้อมเพย์</label><input type="text" class="inp" id="nd-pp" placeholder="081-XXX-XXXX"></div>
    <div style="display:flex;gap:8px;margin-top:6px;">
      <button class="btn bg_ f1" onclick="A.closeModal('m-add-dorm')">ยกเลิก</button>
      <button class="btn bp f1" onclick="A.addDorm()">เพิ่มหอ</button>
    </div>
  </div>
</div>

<div class="ovl" id="m-add-room">
  <div class="modal">
    <div class="m-handle"></div>
    <div class="m-title">เพิ่มห้องพักใหม่</div>
    <div class="r2">
      <div class="fg"><label class="fl">หมายเลขห้อง</label><input type="text" class="inp" id="nr-id" placeholder="101"></div>
      <div class="fg"><label class="fl">ประเภท</label><select class="sel" id="nr-type"><option>Standard</option><option>VIP</option></select></div>
    </div>
    <div class="fg"><label class="fl">ค่าเช่า/เดือน (บาท)</label><input type="number" class="inp" id="nr-rent" placeholder="4500"></div>
    <div style="display:flex;gap:8px;margin-top:6px;">
      <button class="btn bg_ f1" onclick="A.closeModal('m-add-room')">ยกเลิก</button>
      <button class="btn bp f1" onclick="A.addRoom()">เพิ่มห้อง</button>
    </div>
  </div>
</div>

<div class="ovl" id="m-tenant">
  <div class="modal">
    <div class="m-handle"></div>
    <div class="m-title" id="mt-title"></div>
    <input type="hidden" id="mt-rid">
    <div id="mt-body"></div>
  </div>
</div>

<div class="ovl" id="m-deposit">
  <div class="modal">
    <div class="m-handle"></div>
    <div class="m-title">จัดการมัดจำ — ห้อง <span id="dep-lbl"></span></div>
    <div id="dep-body"></div>
  </div>
</div>

<div class="ovl" id="m-month">
  <div class="modal">
    <div class="m-handle"></div>
    <div class="m-title" id="mm-title"></div>
    <div id="mm-body"></div>
    <button class="btn bg_ bblk mt4" onclick="A.closeModal('m-month')">ปิด</button>
  </div>
</div>

<div class="ovl" id="m-bill-prev">
  <div class="modal" style="max-width:600px;">
    <div class="m-handle"></div>
    <div class="m-title">ตรวจสอบก่อนส่งบิล</div>
    <div id="mbp-body"></div>
    <div style="display:flex;gap:8px;margin-top:13px;flex-wrap:wrap;">
      <button class="btn bg_ f1" onclick="A.closeModal('m-bill-prev')">แก้ไข</button>
      <button class="btn bp f1" onclick="A.confirmBulk(false)">สร้างบิลทั้งหมด</button>
      <button class="btn bln f1" onclick="A.confirmBulk(true)">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>สร้าง + แจ้ง LINE
      </button>
    </div>
  </div>
</div>

<div id="toast-wrap"></div>

<script>
// ══════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════
const TH_M=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
const STORE='dormy_v5';
const ic=p=>`<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;flex-shrink:0"><path stroke-linecap="round" stroke-linejoin="round" d="${p}"/></svg>`;

// ══════════════════════════════════════════
// DEFAULT STATE — multi-dorm
// ══════════════════════════════════════════
const DEF=()=>({
  dorms:[
    {
      id:'D1', name:'Dormy หลัก', addr:'ถ.สุขุมวิท', promptpay:'081-XXX-XXXX',
      waterRate:18, electricRate:8, dueDayOfMonth:5,
      rooms:[
        {id:'101',type:'Standard',rentPrice:4500,status:'occupied',tenant:'คุณสมชาย ใจดี',
         moveInDate:'01/01/2567',contractStart:'01/01/2567',contractEnd:'31/12/2568',
         depositAmount:9000,depositStatus:'held',lastWaterMeter:1250,lastElectricMeter:4200},
        {id:'102',type:'Standard',rentPrice:4500,status:'available',tenant:null,
         moveInDate:null,contractStart:null,contractEnd:null,
         depositAmount:0,depositStatus:'none',lastWaterMeter:1000,lastElectricMeter:3000},
        {id:'201',type:'VIP',rentPrice:6500,status:'occupied',tenant:'คุณสมหญิง รักดี',
         moveInDate:'01/06/2567',contractStart:'01/06/2567',contractEnd:'31/05/2568',
         depositAmount:13000,depositStatus:'held',lastWaterMeter:840,lastElectricMeter:2150},
      ],
      bills:[
        {id:'B001',room:'101',month:'เมษายน',year:2568,issueDate:'25/04/2568',dueDate:'05/05/2568',
         rent:4500,ws:1240,we:1250,es:4100,ee:4200,otherFees:0,otherDesc:'',
         total:4500+(10*18)+(100*8),status:'paid',paidDate:'01/05/2568',payNote:''},
        {id:'B002',room:'201',month:'พฤษภาคม',year:2568,issueDate:'25/05/2568',dueDate:'05/06/2568',
         rent:6500,ws:830,we:840,es:2000,ee:2150,otherFees:200,otherDesc:'ค่าส่วนกลาง',
         total:6500+(10*18)+(150*8)+200,status:'unpaid',paidDate:null,payNote:''},
      ],
      repairs:[
        {id:'R001',room:'101',issue:'แอร์น้ำหยด',date:'25/05/2568',status:'pending'},
        {id:'R002',room:'201',issue:'หลอดไฟขาด',date:'20/05/2568',status:'completed'},
      ],
      deposits:[
        {id:'DP001',room:'101',type:'received',amount:9000,date:'01/01/2567',note:'รับมัดจำเริ่มสัญญา'},
      ],
    },
  ],
  activeDorm:'D1',
});

// ══════════════════════════════════════════
// LOAD / SAVE
// ══════════════════════════════════════════
let S=(()=>{try{const r=localStorage.getItem(STORE);if(r)return JSON.parse(r);}catch(e){}return DEF();})();
// patch: ensure fields on each dorm/room
S.dorms.forEach(d=>{
  if(!d.deposits)d.deposits=[];
  if(!d.waterRate)d.waterRate=18;
  if(!d.electricRate)d.electricRate=8;
  if(!d.dueDayOfMonth)d.dueDayOfMonth=5;
  d.rooms.forEach(r=>{
    if(!r.depositStatus)r.depositStatus=r.tenant?'held':'none';
    if(r.depositAmount===undefined)r.depositAmount=0;
    if(!r.contractStart)r.contractStart=null;
    if(!r.contractEnd)r.contractEnd=null;
  });
});
function save(){try{localStorage.setItem(STORE,JSON.stringify(S));}catch(e){}}
function dorm(){return S.dorms.find(d=>d.id===S.activeDorm)||S.dorms[0];}

// ══════════════════════════════════════════
// SESSION
// ══════════════════════════════════════════
let Se={role:null,tenantRoom:null,tab:null,_payBill:null,_bulkRows:null};

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
function nowTH(){return new Date().getFullYear()+543;}
function curMonth(){return TH_M[new Date().getMonth()];}
function curYear(){return nowTH();}
function thaiDate(d){const dt=d||new Date();return`${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}/${dt.getFullYear()+543}`;}
function last12(){const r=[],n=new Date();for(let i=0;i<12;i++){const d=new Date(n.getFullYear(),n.getMonth()-i,1);r.push({month:TH_M[d.getMonth()],year:d.getFullYear()+543});}return r;}
function daysLeft(s){
  if(!s)return null;const p=s.split('/');if(p.length!==3)return null;
  const d=new Date(parseInt(p[2])-543,parseInt(p[1])-1,parseInt(p[0]));
  d.setHours(0,0,0,0);const n=new Date();n.setHours(0,0,0,0);
  return Math.round((d-n)/86400000);
}
function toDateInput(s){
  if(!s)return'';const p=s.split('/');if(p.length!==3)return'';
  return`${parseInt(p[2])-543}-${p[1]}-${p[0]}`;
}
function fromDateInput(s){
  if(!s)return null;const p=s.split('-');if(p.length!==3)return null;
  return`${p[2]}/${p[1]}/${parseInt(p[0])+543}`;
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(-3);}

// ══════════════════════════════════════════
// APP
// ══════════════════════════════════════════
const A={
  // ─── SCREENS ───
  show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');},
  goLanding(){Se={role:null,tenantRoom:null,tab:null,_payBill:null,_bulkRows:null};this.show('scr-landing');},
  goAdmin(){Se.role='admin';this.show('scr-app');this.renderDormSwitcher();this.openTab('dashboard');},
  goTenant(){
    this.show('scr-pin');
    const occ=dorm().rooms.filter(r=>r.status==='occupied');
    document.getElementById('pin-chips').innerHTML=occ.map(r=>`<span class="chip" onclick="A.selPin('${r.id}')">${r.id}</span>`).join('')||'<span style="font-size:12px;color:var(--t3);">ไม่มีห้องที่มีผู้เช่า</span>';
    document.getElementById('pin-inp').value='';
    document.getElementById('pin-err').textContent='';
    document.getElementById('pin-ok').disabled=true;
    setTimeout(()=>document.getElementById('pin-inp').focus(),80);
  },
  selPin(id){document.getElementById('pin-inp').value=id;document.getElementById('pin-ok').disabled=false;document.getElementById('pin-err').textContent='';},
  onPinInput(el){document.getElementById('pin-ok').disabled=!el.value.trim();document.getElementById('pin-err').textContent='';},
  confirmPin(){
    const val=document.getElementById('pin-inp').value.trim();
    // search across all dorms
    let found=null,foundDorm=null;
    for(const d of S.dorms){const r=d.rooms.find(r=>r.id===val);if(r){found=r;foundDorm=d;break;}}
    if(!found){document.getElementById('pin-err').textContent='ไม่พบหมายเลขห้องนี้';return;}
    if(found.status!=='occupied'){document.getElementById('pin-err').textContent='ห้องนี้ยังไม่มีผู้เช่า';return;}
    S.activeDorm=foundDorm.id;
    Se.role='tenant';Se.tenantRoom=found.id;
    this.show('scr-app');
    this.renderDormSwitcher();
    this.openTab('t-home');
  },
  signOut(){this.goLanding();},

  // ─── DORM SWITCHER ───
  renderDormSwitcher(){
    if(Se.role!=='admin'){document.getElementById('nav-dorm-wrap').innerHTML='';return;}
    const d=dorm();
    document.getElementById('nav-dorm-wrap').innerHTML=`
      <div class="dorm-switcher" onclick="A.openDormDrop()">
        <div class="dorm-name">${d.name}</div>
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 9l4-4 4 4m0 6l-4 4-4-4"/></svg>
      </div>`;
  },
  openDormDrop(){
    const d=dorm();
    document.getElementById('dorm-drop').innerHTML=`
      <div class="dorm-drop-title">หอพักของคุณ</div>
      ${S.dorms.map(dd=>`
        <div class="dorm-item${dd.id===S.activeDorm?' active':''}" onclick="A.switchDorm('${dd.id}')">
          <div class="dorm-item-ico">${dd.name.charAt(0)}</div>
          <div><div class="dorm-item-name">${dd.name}</div><div class="dorm-item-sub">${dd.rooms.length} ห้อง &bull; ${dd.rooms.filter(r=>r.status==='occupied').length} มีผู้เช่า ${dd.addr?'&bull; '+dd.addr:''}</div></div>
        </div>`).join('')}
      <div class="dorm-add-btn" onclick="A.openAddDorm()">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
        เพิ่มหอพักใหม่
      </div>`;
    document.getElementById('dorm-overlay').classList.add('open');
  },
  closeDormDrop(e){if(e.target===document.getElementById('dorm-overlay'))document.getElementById('dorm-overlay').classList.remove('open');},
  switchDorm(id){
    S.activeDorm=id;save();
    document.getElementById('dorm-overlay').classList.remove('open');
    this.renderDormSwitcher();
    this.openTab('dashboard');
  },
  openAddDorm(){document.getElementById('dorm-overlay').classList.remove('open');this.openModal('m-add-dorm');},
  addDorm(){
    const name=document.getElementById('nd-name').value.trim();
    const addr=document.getElementById('nd-addr').value.trim();
    const pp=document.getElementById('nd-pp').value.trim();
    if(!name){this.toast('กรอกชื่อหอพัก','error');return;}
    const id='D'+uid();
    S.dorms.push({id,name,addr,promptpay:pp||'',waterRate:18,electricRate:8,dueDayOfMonth:5,rooms:[],bills:[],repairs:[],deposits:[]});
    S.activeDorm=id;save();
    this.closeModal('m-add-dorm');
    this.renderDormSwitcher();
    this.toast('เพิ่มหอ "'+name+'" เรียบร้อย','success');
    this.openTab('rooms');
  },

  // ─── TABS ───
  adminTabs(){
    const d=dorm();

  // ══════════ DASHBOARD ══════════
  pgDash(){
    const d=dorm();
    const occ=d.rooms.filter(r=>r.status==='occupied').length;
    const pb=d.bills.filter(b=>b.status==='unpaid'||b.status==='pending_approval');
    const pi=pb.reduce((s,b)=>s+b.total,0);
    const pr=d.repairs.filter(r=>r.status==='pending').length;
    const na=d.bills.filter(b=>b.status==='pending_approval');
    const exp=d.rooms.filter(r=>{const v=daysLeft(r.contractEnd);return v!==null&&v>=0&&v<=30;});
    const yr=curYear();
    return`
    <div class="fx aic jcsb mb5" style="flex-wrap:wrap;gap:8px;">
      <div><div class="pg-title">ภาพรวม</div><div class="pg-sub">${d.name}${d.addr?' &bull; '+d.addr:''}</div></div>
    </div>
    <div class="sg mb5">
      <div class="stat g"><div class="stat-l">ห้องมีผู้เช่า</div><div class="stat-v">${occ}<span style="font-size:13px;font-weight:500;color:var(--t2)">/${d.rooms.length}</span></div></div>
      <div class="stat a"><div class="stat-l">รายรับรอเก็บ</div><div class="stat-v" style="font-size:16px;">฿${pi.toLocaleString()}</div></div>
      <div class="stat${pr>0?' r':''}"><div class="stat-l">รอซ่อม</div><div class="stat-v">${pr}</div></div>
    </div>
    ${exp.length>0?`<div class="mb5"><div class="sec-lbl">สัญญาใกล้หมด</div><div class="sy">${exp.map(r=>{const v=daysLeft(r.contractEnd);return`<div class="alert ${v<=7?'al-r':v<=14?'al-w':'al-i'}">${ic('M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z')}<span><strong>ห้อง ${r.id}</strong> — ${r.tenant} &bull; หมด ${r.contractEnd} <strong>(อีก ${v} วัน)</strong></span></div>`;}).join('')}</div></div>`:``}
    ${na.length>0?`<div class="mb5"><div class="sec-lbl">รอยืนยันรับเงิน (${na.length})</div><div class="sy">${na.map(b=>{const rm=d.rooms.find(r=>r.id===b.room);return`<div class="li"><div style="flex:1;"><div style="font-weight:700;font-size:14px;">ห้อง ${b.room} <span style="font-weight:400;font-size:12px;color:var(--t2);">${rm?'— '+rm.tenant:''}</span></div><div style="font-size:12px;color:var(--t2);">เดือน ${b.month} ${b.year} &bull; ฿${b.total.toLocaleString()}</div>${b.payNote?`<div style="font-size:11px;color:var(--t3);">${b.payNote}</div>`:''}<span class="badge b-a" style="margin-top:5px;">ผู้เช่าแจ้งโอนแล้ว</span></div><button class="btn bsc bsm" onclick="A.approveBill('${b.id}')">ยืนยัน</button></div>`;}).join('')}</div></div>`:``}
    <div><div class="sec-lbl">สถานะห้องพัก</div><div class="sy">${d.rooms.map(r=>{const v=daysLeft(r.contractEnd);const cw=v!==null&&v>=0&&v<=30;return`<div class="li"><div class="li-ico" style="background:${r.status==='occupied'?'var(--gl)':'var(--s2)'};">${ic('M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6')}</div><div style="flex:1;"><div style="font-weight:600;font-size:14px;">ห้อง ${r.id} <span style="font-weight:400;color:var(--t2);font-size:12px;">${r.type} &bull; ฿${r.rentPrice.toLocaleString()}/เดือน</span></div><div style="font-size:12px;color:var(--t2);">${r.tenant||'ว่าง'}</div>${cw?`<div style="font-size:11px;color:var(--am);">สัญญาหมด ${r.contractEnd} (อีก ${v} วัน)</div>`:''}</div><span class="badge ${r.status==='occupied'?'b-g':'b-gr'}">${r.status==='occupied'?'มีผู้เช่า':'ว่าง'}</span></div>`;}).join('')}</div></div>`;
  },

  // ══════════ ROOMS ══════════
  pgRooms(){
    const d=dorm();
    return`
    <div class="fx aic jcsb mb5" style="flex-wrap:wrap;gap:8px;">
      <div><div class="pg-title">ห้องพัก</div><div class="pg-sub">${d.name} &bull; ${d.rooms.length} ห้อง</div></div>
      <button class="btn bp bsm" onclick="A.openModal('m-add-room')">${ic('M12 4v16m8-8H4')} เพิ่มห้อง</button>
    </div>
    <div class="room-list">
      ${d.rooms.map(r=>{
        const v=daysLeft(r.contractEnd),cw=v!==null&&v>=0&&v<=30;
        return`<div class="room-card ${r.status==='occupied'?'occ':'vac'}">
          <div class="fx aic jcsb" style="flex-wrap:wrap;gap:7px;">
            <div><div class="room-num">ห้อง ${r.id} <span style="font-size:13px;font-weight:400;color:var(--t2);">${r.type}</span></div>
            ${r.tenant?`<div style="font-size:13px;margin-top:2px;">${r.tenant}</div>`:''}
            <div style="font-size:13px;font-weight:700;color:var(--gn);margin-top:3px;">฿${r.rentPrice.toLocaleString()}<span style="font-size:11px;font-weight:400;color:var(--t2);">/เดือน</span></div></div>
            <div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center;">
              <span class="badge ${r.status==='occupied'?'b-g':'b-gr'}">${r.status==='occupied'?'มีผู้เช่า':'ว่าง'}</span>
              ${r.depositStatus==='held'?`<span class="badge b-b">มัดจำ ฿${r.depositAmount.toLocaleString()}</span>`:''}
            </div>
          </div>
          ${r.status==='occupied'?`
          <div class="room-meta">
            เข้าอยู่: ${r.moveInDate||'-'} &bull; สัญญาถึง: ${r.contractEnd||'-'}
            ${cw?` &bull; <span style="color:var(--am);font-weight:600;">อีก ${v} วันหมดสัญญา</span>`:''}
            <br>มิเตอร์น้ำ: <strong>${r.lastWaterMeter}</strong> &nbsp;/&nbsp; มิเตอร์ไฟ: <strong>${r.lastElectricMeter}</strong>
          </div>
          <div class="room-actions">
            <button class="btn bp bsm" onclick="A.openTenantModal('${r.id}','edit')">แก้ไข</button>
            <button class="btn bg_ bsm" onclick="A.openDepositModal('${r.id}')">มัดจำ</button>
            <button class="btn bd_ bsm" onclick="A.openTenantModal('${r.id}','out')">ย้ายออก</button>
          </div>`:
          `<div class="room-actions"><button class="btn bp bsm" onclick="A.openTenantModal('${r.id}','in')">${ic('M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z')} รับผู้เช่าใหม่</button></div>`}
        </div>`;
      }).join('')}
    </div>`;
  },

  addRoom(){
    const id=document.getElementById('nr-id').value.trim();
    const type=document.getElementById('nr-type').value;
    const rent=parseInt(document.getElementById('nr-rent').value);
    const d=dorm();
    if(!id||!rent){this.toast('กรอกข้อมูลให้ครบ','error');return;}
    if(d.rooms.find(r=>r.id===id)){this.toast('ห้อง '+id+' มีอยู่แล้ว','error');return;}
    d.rooms.push({id,type,rentPrice:rent,status:'available',tenant:null,moveInDate:null,contractStart:null,contractEnd:null,depositAmount:0,depositStatus:'none',lastWaterMeter:0,lastElectricMeter:0});
    save();this.closeModal('m-add-room');this.toast('เพิ่มห้อง '+id,'success');this.renderPage();
  },

        <div class="fg"><label class="fl">เริ่มสัญญา</label><input type="date" class="inp" id="mt-cs"></div>
        <div class="fg"><label class="fl">สิ้นสุดสัญญา</label><input type="date" class="inp" id="mt-ce"></div>

      </div>
      <div class="fg"><label class="fl">มิเตอร์ไฟเริ่มต้น</label><input type="number" class="inp" id="mt-e" value="${r.lastElectricMeter}"></div>
      <div style="display:flex;gap:8px;margin-top:6px;">

        <button class="btn bp f1" onclick="A.doIn()">ยืนยันรับผู้เช่า</button>
      </div>`;}
    else if(mode==='edit'){h=`
      <div class="fg"><label class="fl">ชื่อผู้เช่า</label><input type="text" class="inp" id="mt-n" value="${r.tenant||''}"></div>
      <div class="r2">
        <div class="fg"><label class="fl">ค่าเช่า (บาท)</label><input type="number" class="inp" id="mt-rp" value="${r.rentPrice}"></div>
        <div class="fg"><label class="fl">ประเภท</label><select class="sel" id="mt-tp"><option ${r.type==='Standard'?'selected':''}>Standard</option><option ${r.type==='VIP'?'selected':''}>VIP</option></select></div>
      </div>

        <div class="fg"><label class="fl">เริ่มสัญญา</label><input type="date" class="inp" id="mt-cs" value="${toDateInput(r.contractStart)}"></div>

      </div>
      <div style="display:flex;gap:8px;margin-top:6px;">
        <button class="btn bg_ f1" onclick="A.closeModal('m-tenant')">ยกเลิก</button>
        <button class="btn bp f1" onclick="A.doEdit()">บันทึก</button>
      </div>`;}

  doIn(){
    const rid=document.getElementById('mt-rid').value,d=dorm(),r=d.rooms.find(x=>x.id===rid);
    const name=document.getElementById('mt-n').value.trim();
    if(!name){this.toast('กรอกชื่อผู้เช่า','error');return;}
    r.tenant=name;r.status='occupied';
    r.rentPrice=parseInt(document.getElementById('mt-rp').value)||r.rentPrice;
    r.moveInDate=fromDateInput(document.getElementById('mt-mi').value);
    r.contractStart=fromDateInput(document.getElementById('mt-cs').value);
    r.contractEnd=fromDateInput(document.getElementById('mt-ce').value);
    const dep=parseInt(document.getElementById('mt-dp').value)||0;
    r.depositAmount=dep;r.depositStatus=dep>0?'held':'none';
    r.lastWaterMeter=parseFloat(document.getElementById('mt-w').value)||r.lastWaterMeter;
    r.lastElectricMeter=parseFloat(document.getElementById('mt-e').value)||r.lastElectricMeter;
    if(dep>0)d.deposits.push({id:'DP'+uid(),room:rid,type:'received',amount:dep,date:thaiDate(),note:'รับมัดจำผู้เช่าใหม่'});
    save();this.closeModal('m-tenant');this.toast('รับผู้เช่า '+name+' ห้อง '+rid,'success');this.renderPage();
  },
  doEdit(){
    const rid=document.getElementById('mt-rid').value,d=dorm(),r=d.rooms.find(x=>x.id===rid);
    r.tenant=document.getElementById('mt-n').value.trim()||r.tenant;
    r.rentPrice=parseInt(document.getElementById('mt-rp').value)||r.rentPrice;
    r.type=document.getElementById('mt-tp').value;
    r.contractStart=fromDateInput(document.getElementById('mt-cs').value)||r.contractStart;
    r.contractEnd=fromDateInput(document.getElementById('mt-ce').value)||r.contractEnd;
    save();this.closeModal('m-tenant');this.toast('บันทึกข้อมูลห้อง '+rid,'success');this.renderPage();
  },
  doOut(){
    const rid=document.getElementById('mt-rid').value,d=dorm(),r=d.rooms.find(x=>x.id===rid);
    const action=document.getElementById('mt-da').value;
    const note=document.getElementById('mt-dn').value;
    let refund=action==='return'?r.depositAmount:action==='deduct'?Math.max(0,r.depositAmount-(parseInt(document.getElementById('mt-dd').value)||0)):0;
    d.deposits.push({id:'DP'+uid(),room:rid,type:'returned',amount:r.depositAmount,refund,date:thaiDate(),note:note||'คืนมัดจำเมื่อย้ายออก'});
    r.tenant=null;r.status='available';r.moveInDate=null;r.contractStart=null;r.contractEnd=null;r.depositAmount=0;r.depositStatus='returned';
    save();this.closeModal('m-tenant');this.toast(`ย้ายออกเรียบร้อย คืนมัดจำ ฿${refund.toLocaleString()}`,'success');this.renderPage();
  },
  openDepositModal(rid){

      ${hist.length===0?'<div style="font-size:13px;color:var(--t3);">ยังไม่มีประวัติ</div>':hist.map(h=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bd);font-size:13px;"><div><div style="font-weight:600;">${h.type==='received'?'รับมัดจำ':h.type==='returned'?'คืนมัดจำ':'หักค่าเสียหาย'}</div><div style="font-size:11px;color:var(--t2);">${h.date}${h.note?' — '+h.note:''}</div></div><div style="font-weight:700;color:${h.type==='received'?'var(--gn)':h.type==='returned'?'var(--bl)':'var(--rd)'};">฿${h.amount.toLocaleString()}</div></div>`).join('')}`;
    this.openModal('m-deposit');

  addDeposit(rid){
    const d=dorm(),r=d.rooms.find(x=>x.id===rid);
    const type=document.getElementById('dep-t').value;
    const amt=parseInt(document.getElementById('dep-a').value)||0;
    const note=document.getElementById('dep-n').value;
    if(!amt){this.toast('กรอกจำนวนเงิน','error');return;}
    d.deposits.push({id:'DP'+uid(),room:rid,type,amount:amt,date:thaiDate(),note});
    if(type==='received')r.depositAmount+=amt;
    else if(type==='partial')r.depositAmount=Math.max(0,r.depositAmount-amt);
    save();this.closeModal('m-deposit');this.toast('บันทึกมัดจำเรียบร้อย','success');this.renderPage();

  // ══════════ METER (responsive table + mobile cards) ══════════
  pgMeter(){

    if(occ.length===0)return`<div class="pg-title mb5">จดมิเตอร์</div><div class="empty"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg><div class="empty-t">ยังไม่มีห้องที่มีผู้เช่า</div></div>`;
    const month=curMonth(),year=curYear();

    // Desktop TABLE
    const tableRows=occ.map(r=>`
      <tr>
        <td>
          <div style="font-weight:700;font-size:13px;">ห้อง ${r.id}</div>
          <div style="font-size:11px;color:var(--t2);">${r.tenant}</div>

        <td><div class="diff-na" id="wd-${r.id}">—</div></td>
        <td style="text-align:right;font-family:'IBM Plex Sans Thai',sans-serif;font-weight:600;color:var(--t2);">${r.lastElectricMeter}</td>
        <td style="min-width:90px;"><input class="m-inp" type="number" id="e-${r.id}" placeholder="-" oninput="A.onMI('${r.id}')"></td>
        <td><div class="diff-na" id="ed-${r.id}">—</div></td>
        <td style="min-width:80px;"><input class="m-inp" type="number" id="o-${r.id}" value="0" oninput="A.onMI('${r.id}')" style="width:72px;"></td>
        <td><div class="diff-na" id="tot-${r.id}">—</div></td>

    // Mobile CARDS

      <div class="meter-card">
        <div class="meter-card-head">
          <div>
            <div class="meter-card-room">ห้อง ${r.id}</div>
            <div class="meter-card-tenant">${r.tenant} &bull; ฿${r.rentPrice.toLocaleString()}/เดือน</div>
          </div>
          <span class="badge b-g">มีผู้เช่า</span>
        </div>
        <div class="meter-card-body">
          <div class="meter-field">
            <div class="meter-field-label" style="color:var(--bl);">มิเตอร์น้ำ</div>
            <div class="meter-field-row">
              <div class="meter-field-prev">${r.lastWaterMeter}</div>
              <div class="meter-field-arrow">→</div>
              <input class="m-inp" type="number" id="mw-${r.id}" placeholder="กรอกค่าใหม่" oninput="A.onMI2('${r.id}')">
            </div>
            <div class="meter-field-diff" id="mwd-${r.id}"></div>
          </div>
          <div class="meter-field">
            <div class="meter-field-label" style="color:var(--am);">มิเตอร์ไฟ</div>
            <div class="meter-field-row">
              <div class="meter-field-prev">${r.lastElectricMeter}</div>
              <div class="meter-field-arrow">→</div>
              <input class="m-inp" type="number" id="me-${r.id}" placeholder="กรอกค่าใหม่" oninput="A.onMI2('${r.id}')">
            </div>
            <div class="meter-field-diff" id="med-${r.id}"></div>
          </div>
          <div class="meter-card-other">
            <label style="font-size:12px;font-weight:600;color:var(--t2);">ค่าอื่นๆ (บาท)</label>
            <input class="m-inp" type="number" id="mo-${r.id}" value="0" oninput="A.onMI2('${r.id}')">
          </div>
        </div>
        <div class="meter-card-total">
          <div class="meter-card-total-lbl">ยอดรวม</div>
          <div class="meter-card-total-val" id="mtot-${r.id}">—</div>
        </div>
      </div>`).join('');

    return`
    <div class="fx aic jcsb mb5" style="flex-wrap:wrap;gap:8px;">
      <div><div class="pg-title">จดมิเตอร์</div><div class="pg-sub">กรอกทุกห้อง แล้วกดดูสรุปก่อนส่ง</div></div>
      <div style="display:flex;gap:6px;">
        <div style="font-size:12px;color:var(--t2);align-self:center;">เดือน</div>
        <select class="sel" id="bm" style="width:auto;">${TH_M.map(m=>`<option ${m===month?'selected':''}>${m}</option>`).join('')}</select>
        <input type="number" class="inp" id="by" value="${year}" style="width:76px;">
      </div>
    </div>

    <!-- Desktop table -->
    <div class="meter-table-wrap card mb5">
      <div class="ow">
        <table class="meter-table">
          <thead>
            <tr>
              <th>ห้อง / ผู้เช่า</th>
              <th style="color:var(--bl);text-align:right;">น้ำ (เดิม)</th>
              <th style="color:var(--bl);">น้ำ (ใหม่)</th>
              <th style="color:var(--bl);text-align:right;">หน่วย</th>
              <th style="color:var(--am);text-align:right;">ไฟ (เดิม)</th>
              <th style="color:var(--am);">ไฟ (ใหม่)</th>
              <th style="color:var(--am);text-align:right;">หน่วย</th>
              <th>ค่าอื่นๆ</th>
              <th style="color:var(--gn);text-align:right;">รวมทั้งสิ้น</th>
            </tr>
          </thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
    </div>

    <!-- Mobile cards -->
    <div class="meter-cards mb5">${mobileCards}</div>

    <button class="btn bp bblk" style="font-size:15px;padding:12px;" onclick="A.previewBulk()">
      ${ic('M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4')}
      ดูสรุปและส่งบิล
    </button>
    <div class="hint mt3" style="text-align:center;">กรอกเฉพาะห้องที่มีมิเตอร์ใหม่ ห้องที่ไม่กรอกจะข้ามไป</div>`;
  },

  // sync desktop → mobile and vice versa
  onMI(rid){
    const d=dorm(),r=d.rooms.find(x=>x.id===rid);
    const wEl=document.getElementById('w-'+rid),eEl=document.getElementById('e-'+rid);
    const w=parseFloat(wEl?.value),e=parseFloat(eEl?.value);
    const oth=parseFloat(document.getElementById('o-'+rid)?.value)||0;
    const wdEl=document.getElementById('wd-'+rid),edEl=document.getElementById('ed-'+rid),totEl=document.getElementById('tot-'+rid);
    if(wdEl){if(w>0){const d2=w-r.lastWaterMeter;wdEl.textContent=(d2>=0?'+':'')+d2;wdEl.className=d2>=0?'diff-ok':'diff-bad';if(wEl)wEl.className='m-inp'+(d2<0?' err':'');}else{wdEl.textContent='—';wdEl.className='diff-na';if(wEl)wEl.className='m-inp';}}
    if(edEl){if(e>0){const d2=e-r.lastElectricMeter;edEl.textContent=(d2>=0?'+':'')+d2;edEl.className=d2>=0?'diff-ok':'diff-bad';if(eEl)eEl.className='m-inp'+(d2<0?' err':'');}else{edEl.textContent='—';edEl.className='diff-na';if(eEl)eEl.className='m-inp';}}
    if(totEl){if(w>=r.lastWaterMeter&&e>=r.lastElectricMeter&&w>0&&e>0){const tot=r.rentPrice+(w-r.lastWaterMeter)*d.waterRate+(e-r.lastElectricMeter)*d.electricRate+oth;totEl.textContent='฿'+tot.toLocaleString();totEl.className='cost-cell';}else{totEl.textContent='—';totEl.className='diff-na';}}
  },
  onMI2(rid){
    const d=dorm(),r=d.rooms.find(x=>x.id===rid);
    const w=parseFloat(document.getElementById('mw-'+rid)?.value);
    const e=parseFloat(document.getElementById('me-'+rid)?.value);
    const oth=parseFloat(document.getElementById('mo-'+rid)?.value)||0;
    const wdEl=document.getElementById('mwd-'+rid),edEl=document.getElementById('med-'+rid),totEl=document.getElementById('mtot-'+rid);
    if(wdEl){if(w>0){const d2=w-r.lastWaterMeter;wdEl.textContent=(d2>=0?'+ ':'')+(d2)+' หน่วย = ฿'+(d2*d.waterRate).toLocaleString();wdEl.style.color=d2>=0?'var(--gn)':'var(--rd)';}else wdEl.textContent='';}
    if(edEl){if(e>0){const d2=e-r.lastElectricMeter;edEl.textContent=(d2>=0?'+ ':'')+(d2)+' หน่วย = ฿'+(d2*d.electricRate).toLocaleString();edEl.style.color=d2>=0?'var(--gn)':'var(--rd)';}else edEl.textContent='';}
    if(totEl){if(w>=r.lastWaterMeter&&e>=r.lastElectricMeter&&w>0&&e>0){const tot=r.rentPrice+(w-r.lastWaterMeter)*d.waterRate+(e-r.lastElectricMeter)*d.electricRate+oth;totEl.textContent='฿'+tot.toLocaleString();}else totEl.textContent='—';}
  },

  _getRow(rid){
    const d=dorm(),r=d.rooms.find(x=>x.id===rid);
    // try desktop first, fallback mobile
    const wVal=document.getElementById('w-'+rid)?.value||document.getElementById('mw-'+rid)?.value;
    const eVal=document.getElementById('e-'+rid)?.value||document.getElementById('me-'+rid)?.value;
    const oVal=document.getElementById('o-'+rid)?.value||document.getElementById('mo-'+rid)?.value;
    const w=parseFloat(wVal),e=parseFloat(eVal),oth=parseFloat(oVal)||0;
    if(!w&&!e)return null;
    return{room:r,w,e,oth,wD:w-r.lastWaterMeter,eD:e-r.lastElectricMeter,ws:r.lastWaterMeter,es:r.lastElectricMeter};
  },

  previewBulk(){
    const d=dorm();
    const month=document.getElementById('bm').value;
    const year=parseInt(document.getElementById('by').value);
    const occ=d.rooms.filter(r=>r.status==='occupied');
    const rows=[];let grand=0;
    for(const r of occ){
      const row=this._getRow(r.id);
      if(!row)continue;
      if(row.wD<0||row.eD<0){this.toast('ห้อง '+r.id+': เลขมิเตอร์ต้องมากกว่าครั้งก่อน','error');return;}
      const wT=row.wD*d.waterRate,eT=row.eD*d.electricRate;
      const total=r.rentPrice+wT+eT+row.oth;
      grand+=total;
      rows.push({...row,month,year,wT,eT,total});
    }
    if(!rows.length){this.toast('ยังไม่ได้กรอกมิเตอร์ห้องใดเลย','error');return;}
    Se._bulkRows=rows;
    document.getElementById('mbp-body').innerHTML=`
      <div class="alert al-i mb4">${ic('M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z')}<span>เดือน <strong>${month} ${year}</strong> &bull; ${rows.length} ห้อง</span></div>
      <div class="ow">
        <table class="sum-table">
          <thead><tr><th>ห้อง</th><th>ผู้เช่า</th><th>ค่าเช่า</th><th>น้ำ</th><th>ไฟ</th><th>อื่นๆ</th><th>รวม</th></tr></thead>
          <tbody>
            ${rows.map(row=>`<tr>
              <td style="font-weight:700;">ห้อง ${row.room.id}</td>
              <td>${row.room.tenant}</td>
              <td style="text-align:right;">฿${row.room.rentPrice.toLocaleString()}</td>
              <td style="text-align:right;color:var(--bl);">฿${row.wT.toLocaleString()}<br><span style="font-size:10px;color:var(--t2);">${row.wD} หน่วย</span></td>
              <td style="text-align:right;color:var(--am);">฿${row.eT.toLocaleString()}<br><span style="font-size:10px;color:var(--t2);">${row.eD} หน่วย</span></td>
              <td style="text-align:right;">${row.oth>0?'฿'+row.oth.toLocaleString():'-'}</td>
              <td style="text-align:right;font-weight:700;color:var(--gn);">฿${row.total.toLocaleString()}</td>
            </tr>`).join('')}
            <tr class="tr-tot"><td colspan="6" style="text-align:right;">รวม ${rows.length} ห้อง</td><td class="grand-tot">฿${grand.toLocaleString()}</td></tr>
          </tbody>
        </table>
      </div>`;
    this.openModal('m-bill-prev');
  },

  confirmBulk(notify){
    const d=dorm();
    const rows=Se._bulkRows||[];
    for(const row of rows){
      const due=`${String(d.dueDayOfMonth).padStart(2,'0')}/${String(TH_M.indexOf(row.month)+1).padStart(2,'0')}/${row.year}`;
      d.bills.unshift({id:'B'+uid(),room:row.room.id,month:row.month,year:row.year,issueDate:thaiDate(),dueDate:due,rent:row.room.rentPrice,ws:row.ws,we:row.w,es:row.es,ee:row.e,otherFees:row.oth,otherDesc:'',total:row.total,status:'unpaid',paidDate:null,payNote:''});
      const r=d.rooms.find(x=>x.id===row.room.id);
      r.lastWaterMeter=row.w;r.lastElectricMeter=row.e;
    }
    save();this.closeModal('m-bill-prev');
    this.toast(notify?`สร้างบิล + แจ้ง LINE ${rows.length} ห้อง`:`สร้างบิล ${rows.length} ห้อง`,'success');
    this.openTab('billing');
  },

  // ══════════ BILLING ══════════
  pgBilling(){

    const active=d.bills.filter(b=>b.status!=='paid');
    const paid=d.bills.filter(b=>b.status==='paid').slice(0,5);
    return`
    <div class="fx aic jcsb mb5" style="flex-wrap:wrap;gap:8px;">
      <div><div class="pg-title">บิลและการชำระ</div></div>
    </div>
    ${active.length===0?`<div class="alert al-ok mb5">${ic('M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z')}ทุกห้องชำระเรียบร้อยแล้ว</div>`:``}
    ${active.length>0?`<div class="sec-lbl">รอชำระ (${active.length})</div><div class="sy mb5">${active.map(b=>{
      const rm=d.rooms.find(r=>r.id===b.room);
      const wD=b.we-b.ws,eD=b.ee-b.es;
      const sb=b.status==='pending_approval'?'<span class="badge b-a">แจ้งโอนแล้ว</span>':'<span class="badge b-r">รอชำระ</span>';
      return`<div class="card"><div class="cpsm">
        <div class="fx aic jcsb" style="flex-wrap:wrap;gap:6px;margin-bottom:5px;"><div><strong>ห้อง ${b.room}</strong> <span style="font-size:12px;color:var(--t2);">${rm?rm.tenant:''}</span></div>${sb}</div>
        <div style="font-size:12px;color:var(--t2);margin-bottom:4px;">เดือน ${b.month} ${b.year} &bull; ครบกำหนด ${b.dueDate}</div>
        <div style="font-size:12px;color:var(--t2);margin-bottom:7px;">ค่าเช่า ฿${b.rent.toLocaleString()} &bull; น้ำ ${wD}u ฿${(wD*d.waterRate).toLocaleString()} &bull; ไฟ ${eD}u ฿${(eD*d.electricRate).toLocaleString()}${b.otherFees>0?' &bull; อื่นๆ ฿'+b.otherFees.toLocaleString():''}</div>
        <div style="font-family:'IBM Plex Sans Thai',sans-serif;font-size:19px;font-weight:700;color:var(--gn);margin-bottom:9px;">฿${b.total.toLocaleString()}</div>

          ${b.status==='pending_approval'?`<button class="btn bsc bsm f1" onclick="A.approveBill('${b.id}')">ยืนยันรับเงิน</button>`:`<button class="btn bg_ bsm f1" disabled>รอผู้เช่าโอน</button>`}
          <button class="btn bln bsm" onclick="A.sendLine('${b.id}')">${ic('M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z')} LINE</button>
        </div>
        ${b.payNote?`<div style="font-size:11px;color:var(--t3);margin-top:5px;">หมายเหตุ: ${b.payNote}</div>`:''}
      </div></div>`;}).join('')}</div>`:``}
    <div class="sec-lbl">ชำระแล้ว (5 ล่าสุด)</div>
