                                }).join('')}
                            </div>
                        `;
                    }
                } else {
                    const approvedBookings = myBookings.filter(b => b.status === 'approved');
                    
                    if (approvedBookings.length === 0) {
                        contentHtml = `
                            <div class="text-center py-12 bg-white rounded-[2rem] border border-brand-100 shadow-sm animate-fade-in">
                                <div class="bg-brand-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-3 text-neutral/30"><i data-lucide="calendar-x" class="w-8 h-8"></i></div>
                                <div class="text-sm font-bold text-neutral mb-1">ยังไม่มีตารางเรียน</div>
                                <div class="text-xs text-neutral/50">คุณจะเห็นตารางเรียนเมื่อการจองได้รับการอนุมัติแล้ว</div>
                            </div>
                        `;
                    } else {
                        const mySchedules = [];
                        approvedBookings.forEach(b => {
                            const cls = state.classes.find(c => c.id === b.classId);
                            if(cls) {
                                cls.schedules.forEach((sch, idx) => {
                                    mySchedules.push({ ...cls, schDate: sch.date, schTime: sch.time, schIndex: idx });
                                });
                            }
                        });

                        mySchedules.sort((a,b) => this.parseClassTime(a.schDate, a.schTime) - this.parseClassTime(b.schDate, b.schTime));

                        const groupedSchedule = {};
                        mySchedules.forEach(s => {
                            if(!groupedSchedule[s.schDate]) groupedSchedule[s.schDate] = [];
                            groupedSchedule[s.schDate].push(s);
                        });

                        const todayStart = new Date().setHours(0,0,0,0);

                        contentHtml = `
                            <div class="relative border-l-[3px] border-secondary/30 ml-3 md:ml-6 space-y-8 pb-8 animate-fade-in">
                                ${Object.keys(groupedSchedule).map(date => {
                                    const schedulesInDate = groupedSchedule[date];
                                    const isPast = this.parseDateOnly(date) < todayStart;
                                    
                                    return `
                                    <div class="relative ${isPast ? 'opacity-60 grayscale-[30%]' : ''}">
                                        <div class="absolute w-5 h-5 bg-${isPast ? 'brand-200' : 'secondary'} rounded-full -left-[11px] top-0 ring-[6px] ring-[#faf7f5] flex items-center justify-center shadow-sm">
                                            <div class="w-2 h-2 bg-white rounded-full"></div>
                                        </div>
                                        
                                        <div class="pl-8 font-bold text-neutral text-lg mb-4 flex items-center gap-2">
                                            <div class="p-1.5 rounded-lg ${isPast ? 'bg-brand-100 text-neutral/50' : 'bg-secondary/10 text-secondary'}">
                                                <i data-lucide="calendar-days" class="w-5 h-5"></i>
                                            </div>
                                            <span class="${isPast ? 'text-neutral/50' : ''}">${date}</span>
                                        </div>
                                        
                                        <div class="pl-8 space-y-4">
                                            ${schedulesInDate.map(sch => {
                                                const attKey = `${sch.id}_${sch.schIndex}_${state.currentStudentId}`;
                                                const isPresent = state.attendance.includes(attKey);
                                                
                                                let attBadge = '';
                                                if (isPast && isPresent) attBadge = '<span class="text-[10px] text-success font-bold flex items-center gap-1"><i data-lucide="check-circle" class="w-3 h-3"></i> มาเรียน</span>';
                                                else if (isPast && !isPresent) attBadge = '<span class="text-[10px] text-error font-bold flex items-center gap-1"><i data-lucide="x-circle" class="w-3 h-3"></i> ขาดเรียน</span>';

                                                return `
                                                <div class="bg-white rounded-[2rem] p-4 border border-brand-100 shadow-card flex gap-4 items-center relative overflow-hidden">
                                                    ${isPast ? `<div class="absolute top-0 right-0 bg-brand-50 px-2 py-1 rounded-bl-xl border-l border-b border-brand-100">${attBadge}</div>` : ''}
                                                    <div class="w-12 h-12 rounded-2xl ${isPast ? 'bg-brand-100 text-neutral/50' : 'bg-primary/10 text-primary'} flex items-center justify-center flex-none">
                                                        <i data-lucide="clock" class="w-6 h-6"></i>
                                                    </div>
                                                    <div class="flex-1 pr-16">
                                                        <div class="text-[11px] font-bold text-secondary mb-0.5 flex items-center gap-2">
                                                            เวลา ${sch.schTime} 
                                                            <span class="text-neutral/40 px-1.5 bg-brand-50 rounded text-[9px]">ครั้งที่ ${sch.schIndex+1}/${sch.schedules.length}</span>
                                                        </div>
                                                        <div class="text-[10px] text-primary font-bold mb-0.5 flex items-center gap-1">
                                                            <i data-lucide="graduation-cap" class="w-3 h-3"></i>
                                                            <span>${sch.instituteName || 'TutorBooking'}</span>
                                                            ${sch.tutorName ? `<span class="text-neutral/40 font-normal">(${sch.tutorName})</span>` : ''}
                                                        </div>
                                                        <h3 class="font-bold text-neutral text-sm leading-tight">${sch.title}</h3>
                                                    </div>
                                                </div>
                                                `;
                                            }).join('')}
                                        </div>
                                    </div>
                                    `
                                }).join('')}
                            </div>
                        `;
                    }
                }

                return `
                    <div class="space-y-4">
                        <div class="mb-2">
                            <h1 class="text-2xl font-bold text-neutral">คอร์สของฉัน</h1>
                            <p class="text-sm text-neutral/60">ตรวจสอบสถานะจองและตารางเรียนของคุณ</p>
                        </div>
                        
                        <div class="flex bg-white p-1.5 rounded-full w-full max-w-sm mx-auto shadow-sm border border-brand-100 relative z-10 mb-4">
                            <button onclick="app.switchStudentClassTab('bookings')" class="flex-1 text-sm font-bold rounded-full py-2 transition-all ${!isScheduleTab ? 'bg-secondary text-white shadow-soft' : 'text-neutral/50 hover:bg-brand-50'}">รายการชำระเงิน</button>
                            <button onclick="app.switchStudentClassTab('schedule')" class="flex-1 text-sm font-bold rounded-full py-2 transition-all ${isScheduleTab ? 'bg-primary text-white shadow-soft' : 'text-neutral/50 hover:bg-brand-50'}">ตารางเรียน</button>
                        </div>

                        ${contentHtml}
                    </div>
                `;
            },

            // ==========================================

                    const response = await fetch("http://127.0.0.1:8000/api/settings", {
                        method: "PUT",
                        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
                        body: JSON.stringify({ 
                            ...state.institute,
                            auto_accept_followers: checked 
                        })
                    });
                    if (response.ok) {
                        state.institute.auto_accept_followers = checked;
                        this.showToast(checked ? 'เปิดรับนักเรียนอัตโนมัติแล้ว' : 'ปิดรับอัตโนมัติ (ต้องยืนยันเอง)', 'success');
                    }
                } catch (e) {
                    this.showToast('อัปเกรดการตั้งค่าล้มเหลว', 'error');
                }
            },

            async saveInstituteSettings() {
                const name = document.getElementById('setting-inst-name').value;
                const bankName = document.getElementById('setting-bank-name').value;
                const accName = document.getElementById('setting-acc-name').value;
                const accNum = document.getElementById('setting-acc-num').value;
                const timeoutEl = document.getElementById('setting-timeout');
                const timeout = timeoutEl ? parseInt(timeoutEl.value) : 5;

                if (!name || !bankName || !accName || !accNum) {
                    this.showToast('กรุณากรอกข้อมูลให้ครบถ้วน', 'error'); return;
                }

                try {
                    const token = localStorage.getItem("access_token");
                    const response = await fetch("http://127.0.0.1:8000/api/settings", {
                        method: "PUT",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            name,
                            bankName,
                            accountName: accName,
                            accountNumber: accNum,
                            auto_accept_followers: state.institute.auto_accept_followers,
                            payment_timeout_minutes: timeout
                        })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        state.institute = data;
                        this.showToast('บันทึกการตั้งค่าระบบเรียบร้อย', 'success');
                        this.renderNav();
                        this.render();
                    } else {
                        const err = await response.json();
                        this.showToast(err.detail || 'บันทึกการตั้งค่าล้มเหลว', 'error');
                    }
                } catch (e) {
                    this.showToast('เชื่อมต่อเซิร์ฟเวอร์ล้มเหลว', 'error');
                }
            },

            requestUpgradePlan(planName) {
                const msg = `คุณต้องการอัปเกรดเป็น <b>${planName}</b> ใช่หรือไม่?<br><span class="text-neutral/50 text-xs mt-2 block font-medium">ระบบจะเริ่มต้นใช้งานแพ็กเกจใหม่ให้คุณทันที</span>`;
                this.showConfirm('อัปเกรดแพ็กเกจ', msg, 'ยืนยันอัปเกรด', 'btn-primary shadow-soft', 'upgrade', planName);
            },

            async upgradePlan(planName) {
                try {
                    const token = localStorage.getItem("access_token");
                    const response = await fetch("http://127.0.0.1:8000/api/users/me/subscription", {
                        method: "PUT",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${token}`
                        },
                        body: JSON.stringify({ plan: planName })
                    });

                    if (response.ok) {
                        const user = await response.json();
                        state.subscription.plan = user.subscription_plan;
                        state.subscription.daysLeft = user.subscription_days_left;
                        this.showToast(`อัปเกรดเป็น ${planName} สำเร็จ!`, 'success');
                        this.render();
                    } else {
                        const err = await response.json();
                        this.showToast(err.detail || 'อัปเกรดแพ็กเกจล้มเหลว', 'error');
                    }
                } catch (e) {
                    this.showToast('เชื่อมต่อเซิร์ฟเวอร์ล้มเหลว', 'error');
                }
            },

            copyToClipboard(text, message = 'คัดลอกลงคลิปบอร์ดแล้ว') {
                try {
                    navigator.clipboard.writeText(text);
                    this.showToast(message, 'success');
                } catch(e) {
                    const el = document.createElement('textarea');
                    el.value = text;
                    document.body.appendChild(el);
                    el.select();
                    document.execCommand('copy');
                    document.body.removeChild(el);
                    this.showToast(message, 'success');
                }
            },

            async toggleAttendance(classId, schIndex, studentId, checked, element) {
                const key = `${classId}_${schIndex}_${studentId}`;
                
                try {
                    const token = localStorage.getItem("access_token");
                    const response = await fetch("http://127.0.0.1:8000/api/attendance/toggle", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            id: key,
                            classId,
                            schIndex,
                            studentId
                        })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        if (data.checked) {
                            if (!state.attendance.includes(key)) state.attendance.push(key);
                        } else {
                            state.attendance = state.attendance.filter(k => k !== key);
                        }
                        
                        this.showToast(data.checked ? 'เช็คมาเรียนแล้ว' : 'ยกเลิกเช็คชื่อ (ขาด)', data.checked ? 'success' : 'info');

                        if (element) {
                            const container = element.closest('div.bg-white.border'); 
                            if (container) {
                                const statusText = container.querySelector('.att-status-text');
                                if (data.checked) {
                                    container.classList.add('border-primary/50', 'bg-primary/5');
                                    if(statusText) {
                                        statusText.className = 'text-xs font-bold att-status-text text-primary';
                                        statusText.innerHTML = '<i data-lucide="check-circle" class="w-3 h-3 inline"></i> มาเรียน';
                                    }
                                } else {
                                    container.classList.remove('border-primary/50', 'bg-primary/5');
                                    if(statusText) {
                                        statusText.className = 'text-xs font-bold att-status-text text-neutral/40';
                                        statusText.innerHTML = '<i data-lucide="x-circle" class="w-3 h-3 inline"></i> ขาดเรียน';
                                    }
                                }
                                lucide.createIcons({ root: container });
                            }
                        }
                    } else {
                        const err = await response.json();
                        this.showToast(err.detail || 'เช็คชื่อล้มเหลว', 'error');
                        if (element) element.checked = !checked;
                    }
                } catch (e) {
                    this.showToast('เชื่อมต่อเซิร์ฟเวอร์ล้มเหลว', 'error');
                    if (element) element.checked = !checked;
                }
            },

            showConfirm(title, message, btnText, btnClass, actionType, actionData) {
                document.getElementById('confirm_title').innerText = title;
                document.getElementById('confirm_message').innerHTML = message;
                
                const btn = document.getElementById('confirm_btn');
                btn.innerText = btnText;
                btn.className = `btn flex-1 rounded-full text-white shadow-md border-none font-medium transition-transform active:scale-95 ${btnClass}`;
                
                const iconContainer = document.getElementById('confirm_icon_container');
                iconContainer.className = 'mx-auto flex items-center justify-center h-16 w-16 rounded-full mb-4 transition-colors ';
                
                let iconName = 'alert-circle';
                if (actionType === 'book') {
                    iconContainer.className += 'bg-secondary/10 text-secondary';
                    iconName = 'calendar-plus';
                } else if (actionType === 'approve') {
                    iconContainer.className += 'bg-success/10 text-success';
                    iconName = 'check-circle-2';
                } else if (actionType === 'reject') {
                    iconContainer.className += 'bg-error/10 text-error';
                    iconName = 'x-circle';
                } else if (actionType === 'upgrade') {
                    iconContainer.className += 'bg-primary/10 text-primary';
                    iconName = 'zap';
                }
                
                document.getElementById('confirm_icon').setAttribute('data-lucide', iconName);
                lucide.createIcons({ root: document.getElementById('confirm_modal') });
                
                this.pendingAction = actionType;
                this.pendingActionData = actionData;
                
                document.getElementById('confirm_modal').showModal();
            },

            async unfollowTutor(inviteCode, tutorName) {
                const msg = `คุณต้องการเลิกติดตาม <b>${tutorName}</b> ใช่หรือไม่? คอร์สเรียนของติวเตอร์ท่านนี้จะหายไปจากหน้าหาคอร์สเรียนของคุณ`;
                this.showConfirm('เลิกติดตาม', msg, 'ยืนยันเลิกติดตาม', 'btn-error shadow-error/30', 'unfollow', inviteCode);
            },

            async removeFollower(studentId, studentName) {
                const msg = `คุณต้องการลบ <b>${studentName}</b> ออกจากรายชื่อลูกศิษย์ใช่หรือไม่? นักเรียนท่านนี้จะไม่เห็นคอร์สเรียนของคุณอีกต่อไป`;
                this.showConfirm('ลบลูกศิษย์', msg, 'ยืนยันการลบ', 'btn-error shadow-error/30', 'remove_follower', studentId);
            },

            executeConfirm() {
                const action = this.pendingAction;
                const data = this.pendingActionData;
                document.getElementById('confirm_modal').close();

                if (action === 'book') this.bookClass(data);
                else if (action === 'approve') this.approveBooking(data);
                else if (action === 'reject') this.rejectBooking(data);
                else if (action === 'upgrade') this.upgradePlan(data);
                else if (action === 'unfollow') this.confirmUnfollow(data);
                else if (action === 'remove_follower') this.confirmRemoveFollower(data);

                this.pendingAction = null;
                this.pendingActionData = null;
            },

            async confirmUnfollow(inviteCode) {
                try {
                    const token = localStorage.getItem("access_token");
                    const response = await fetch("http://127.0.0.1:8000/api/users/unfollow", {
                        method: "POST",
                        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
                        body: JSON.stringify({ invite_code: inviteCode })
                    });
                    if (response.ok) {
                        const data = await response.json();
                        this.showToast(data.message || 'เลิกติดตามเรียบร้อยแล้ว', 'success');
                        state.tutorSearchResults = (state.tutorSearchResults || []).map((tutor) => {
                            if (tutor.invite_code !== inviteCode) return tutor;
                            return {
                                ...tutor,
                                is_following: false,
                                is_pending: false,
                            };
                        });
                        await this.fetchNetwork();
                        await this.fetchClasses();
                        this.render();
                    } else {
                        const data = await response.json();
                        this.showToast(data.detail || data.message || 'เลิกติดตามไม่สำเร็จ', 'error');
                    }
                } catch (e) {
                    this.showToast('เลิกติดตามล้มเหลว', 'error');
                }
            },

            async confirmRemoveFollower(studentId) {
                try {
                    const token = localStorage.getItem("access_token");
                    const response = await fetch("http://127.0.0.1:8000/api/users/remove-follower", {
                        method: "POST",
                        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
                        body: JSON.stringify({ student_id: studentId })
                    });
                    if (response.ok) {
                        this.showToast('ลบลูกศิษย์เรียบร้อยแล้ว', 'success');
                        await this.fetchNetwork();
                        this.render();
                    }
                } catch (e) {
                    this.showToast('ลบลูกศิษย์ล้มเหลว', 'error');

            requestBookClass(classId) {

            renderChart() {
                const ctx = document.getElementById('revenueChart');
                if (!ctx) return;
                if (this.chartInstance) this.chartInstance.destroy();

                const monthNames = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
                const referenceDate = new Date(2026, 4, 25); // May 2026
                
                const last6Months = [];
                for (let i = 5; i >= 0; i--) {
                    const d = new Date(referenceDate.getFullYear(), referenceDate.getMonth() - i, 1);
                    last6Months.push({
                        year: d.getFullYear(),
                        monthIndex: d.getMonth(),
                        monthLabel: monthNames[d.getMonth()],
                        amount: 0
                    });
                }

                const classPriceMap = {};
                (state.classes || []).forEach(c => {
                    classPriceMap[c.id] = c.price || 0;
                });

                (state.bookings || []).forEach(b => {
                    if (b.status === 'approved' && b.created_date) {
                        const bDate = new Date(this.parseThaiDateTime(b.created_date));
                        const bYear = bDate.getFullYear();
                        const bMonth = bDate.getMonth();
                        
                        const slot = last6Months.find(m => m.year === bYear && m.monthIndex === bMonth);
                        if (slot) {
                            slot.amount += classPriceMap[b.classId] || 0;
                        }
                    }
                });

                const labels = last6Months.map(d => d.monthLabel);
                const data = last6Months.map(d => d.amount);

                this.chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'รายได้ (บาท)',
                            data: data,
                            borderColor: '#65c3c8',
                            backgroundColor: 'rgba(101, 195, 200, 0.2)',
                            borderWidth: 3,
                            tension: 0.4,
                            fill: true,
                            pointBackgroundColor: '#ef9fbc',
                            pointBorderColor: '#fff',
                            pointRadius: 4,
                            pointHoverRadius: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: {
                                beginAtZero: true,
                                grid: { color: 'rgba(0,0,0,0.05)' },
                                ticks: { callback: function(value) { return '฿' + value.toLocaleString(); } }
                            },
                            x: { grid: { display: false } }
                        }
                    }
                });
            },

            calculateTotalHours(schedules) {
                if (!schedules || schedules.length === 0) return 0;
                let totalMin = 0;
                schedules.forEach(sch => {
                    if (!sch.time || !sch.time.includes(' - ')) return;
                    const parts = sch.time.split(' - ');
                    if (parts.length !== 2) return;
                    const startParts = parts[0].split(':');
                    const endParts = parts[1].split(':');
                    if (startParts.length !== 2 || endParts.length !== 2) return;
                    const startMinutes = parseInt(startParts[0], 10) * 60 + parseInt(startParts[1], 10);
                    const endMinutes = parseInt(endParts[0], 10) * 60 + parseInt(endParts[1], 10);
                    if (endMinutes > startMinutes) {
                        totalMin += (endMinutes - startMinutes);
                    }
                });
                if (totalMin <= 0) return 0;
                const hours = totalMin / 60;
                return Number(hours.toFixed(2));
            },

            displayDate(isoStr) {
                if(!isoStr) return '';
                try {
                    const d = new Date(isoStr);
                    if(isNaN(d.getTime())) return '';
                    const day = d.getDate().toString().padStart(2, '0');
                    const month = (d.getMonth() + 1).toString().padStart(2, '0');
                    const year = d.getFullYear() + 543;
                    return `${day}/${month}/${year}`;
                } catch(e) { return ''; }
            },

            displayDateTime(isoStr) {
                if(!isoStr) return '';
                try {
                    const d = new Date(isoStr);
                    if(isNaN(d.getTime())) return '';
                    const day = d.getDate().toString().padStart(2, '0');
                    const month = (d.getMonth() + 1).toString().padStart(2, '0');
                    const year = d.getFullYear() + 543;
                    const hours = d.getHours().toString().padStart(2, '0');
                    const mins = d.getMinutes().toString().padStart(2, '0');
                    return `${day}/${month}/${year} ${hours}:${mins}`;
                } catch(e) { return ''; }
            },

            showToast(message, type = 'info') {
                const container = document.getElementById('toast-container');
                if (!container) return;

                let alertClass = 'bg-neutral text-white';
                let iconName = 'info';
                
                if (type === 'success') {
                    alertClass = 'bg-primary text-white shadow-soft';
                    iconName = 'check-circle-2';
                } else if (type === 'error') {
                    alertClass = 'bg-error text-white shadow-soft';
                    iconName = 'alert-circle';
                }

                const toast = document.createElement('div');
                toast.className = `flex items-center gap-3 px-5 py-3.5 rounded-full shadow-lg transform transition-all duration-300 translate-y-[-100%] opacity-0 text-sm font-medium ${alertClass}`;
                toast.innerHTML = `<i data-lucide="${iconName}" class="w-5 h-5"></i><span>${message}</span>`;
                
                container.appendChild(toast);
                lucide.createIcons({ root: toast });

                setTimeout(() => toast.classList.remove('translate-y-[-100%]', 'opacity-0'), 10);
                setTimeout(() => {
                    toast.classList.add('translate-y-[-100%]', 'opacity-0');
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            }
        };

        window.addEventListener('DOMContentLoaded', () => {
            window.app = app;
            window.state = state;
            app.init();
        });
    </script>
</body>
</html>
